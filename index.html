      <div className="card" style={{ marginTop: 16, padding: "0 22px" }}>
        <Collapsible title="変動シナリオの根拠（5段階）" icon="📊">
          <ul style={{ margin: 0, paddingLeft: 18, fontSize: 13.5, lineHeight: 1.8, color: "var(--ink-2)" }}>
            <li><strong style={{ color: "var(--green)" }}>強気（+1%/年）</strong>：再開発・人口増・人気化エリアで実際に見られた値上がり水準。</li>
            <li><strong style={{ color: "var(--green)" }}>やや強気（0%/年）</strong>：横ばい〜微増。立地が良く需要が底堅いケース。</li>
            <li><strong style={{ color: "var(--ink)" }}>標準（年率 {Calc.fmtMan(Math.abs(basePct))}%）</strong>：REINS実データ準拠の、築年数帯に応じた減価。</li>
            <li><strong style={{ color: "var(--amber)" }}>やや弱気（標準 −1pt）</strong>：標準よりやや早く価値が下がるケース。</li>
            <li><strong style={{ color: "var(--red)" }}>暴落（リーマン級）</strong>：標準減価に加え、最初の2〜3年で追加 −12% の市場下落を織り込み、以後はベースペース。下落の上限としてリーマン級を想定。</li>
          </ul>
          {TYPE_TENDENCY[typeKey] && (
            <div style={{ marginTop: 16, padding: "14px 16px", background: "var(--blue-bg)", border: "1px solid var(--blue-line)", borderRadius: 10 }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: "var(--blue)", marginBottom: 6 }}>📝 {Calc.PROPERTY_TYPES[typeKey].label}の傾向</div>
              <p style={{ margin: 0, fontSize: 13, lineHeight: 1.75, color: "var(--ink-2)" }}>{TYPE_TENDENCY[typeKey]}</p>
            </div>
          )}
        </Collapsible>
      </div>
      )}
    </section>
  );
}

Object.assign(window, { OutputExit });

</script>

<script type="text/babel">
/* ②途中入力（パーソナライズ） */
const { useState: useStateSI } = React;

function EventEditor({ ev, onChange, onRemove }) {
  const def = Calc.EVENT_DEFS[ev.type];
  const needsDuration = def.kind === "income_self" || def.kind === "income_partner" || def.hasDuration;
  const needsIncome = def.kind === "income_set_self" || def.kind === "income_set_partner";
  return (
    <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 10, background: "#fff", border: "1px solid var(--line-2)", borderRadius: 10, padding: "10px 12px" }}>
      <span style={{ fontSize: 18 }}>{def.icon}</span>
      <span style={{ fontSize: 13.5, fontWeight: 700, minWidth: 92 }}>{def.label}</span>
      <MiniNum label="何年後" value={ev.year} onChange={(v) => onChange({ ...ev, year: v })} suffix="年後" />
      {needsDuration && <MiniNum label="期間" value={ev.duration} onChange={(v) => onChange({ ...ev, duration: v })} suffix="年間" />}
      {needsIncome && <MiniNum label="転職後の年収" value={ev.newIncome} onChange={(v) => onChange({ ...ev, newIncome: v })} suffix="万円/年" wide />}
      {def.editableLump && <MiniNum label="一時費用" value={ev.lump} onChange={(v) => onChange({ ...ev, lump: v })} suffix="万円" wide />}
      <button onClick={onRemove} style={{ marginLeft: "auto", border: "none", background: "var(--bg-2)", color: "var(--muted)", width: 26, height: 26, borderRadius: "50%", fontSize: 15, fontWeight: 700, lineHeight: 1 }}>×</button>
    </div>
  );
}
function MiniNum({ label, value, onChange, suffix, wide }) {
  return (
    <label style={{ display: "inline-flex", alignItems: "center", gap: 5 }}>
      <span style={{ fontSize: 11.5, color: "var(--muted)", fontWeight: 700 }}>{label}</span>
      <span style={{ position: "relative", display: "inline-flex", alignItems: "center" }}>
        <input type="number" value={value} onChange={(e) => onChange(e.target.value === "" ? "" : parseFloat(e.target.value))}
          className="num"
          style={{ width: wide ? 72 : 56, padding: "6px 8px", border: "1.5px solid var(--line-2)", borderRadius: 8, fontSize: 14, fontWeight: 700, textAlign: "center" }} />
      </span>
      <span style={{ fontSize: 11, color: "var(--muted)", fontWeight: 700 }}>{suffix}</span>
    </label>
  );
}

function SecondaryInput({ initial, onApply, onClose, savings, normalClosing, beginner }) {
  const [pair, setPair] = useStateSI(initial.pair || false);
  const [partnerTakeHome, setPartner] = useStateSI(initial.partnerTakeHome || "");
  const [gift, setGift] = useStateSI(initial.gift || "");
  const [events, setEvents] = useStateSI(initial.events || []);

  const giftN = parseFloat(gift) || 0;
  const available = (savings || 0) + giftN;
  const surplus = available - (normalClosing || 0);

  const addEvent = (type) => {
    const child = events.find(e => e.type === "child");
    const childYear = child ? (parseFloat(child.year) || 0) : null;
    const base = { id: Date.now() + Math.random(), type, year: 2 };
    if (type === "child") {
      base.year = 1;
    } else if (type === "leave_self" || type === "leave_partner") {
      base.year = childYear != null ? childYear : 1; base.duration = 1;
    } else if (type === "edu") {
      base.year = childYear != null ? childYear + 12 : 14; base.duration = 6;
    } else if (type === "job_self" || type === "job_partner") {
      base.year = 3; base.newIncome = 500;
    } else if (type === "marriage") {
      base.year = 1; base.lump = Calc.EVENT_DEFS.marriage.lump;
    }
    setEvents([...events, base]);
  };
  const updateEvent = (id, next) => setEvents(events.map(e => e.id === id ? next : e));
  const removeEvent = (id) => setEvents(events.filter(e => e.id !== id));

  const apply = () => {
    onApply({
      pair, partnerTakeHome: parseFloat(partnerTakeHome) || 0,
      gift: giftN, events,
    });
  };

  const eventButtons = Object.values(Calc.EVENT_DEFS);

  return (
    <div className="rise" style={{ position: "fixed", inset: 0, zIndex: 100, display: "flex", justifyContent: "flex-end" }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(20,24,30,.32)", backdropFilter: "blur(2px)" }} />
      <div style={{ position: "relative", width: "min(560px, 100%)", height: "100%", background: "var(--bg)", boxShadow: "var(--shadow-lg)", overflowY: "auto", animation: "slideIn .35s var(--ease) both" }}>
        <style>{`@keyframes slideIn{from{transform:translateX(40px);opacity:.4}to{transform:none;opacity:1}}`}</style>
        <div style={{ position: "sticky", top: 0, background: "var(--bg)", borderBottom: "1px solid var(--line)", padding: "18px 24px", display: "flex", alignItems: "center", gap: 12, zIndex: 2 }}>
          <div style={{ flex: 1 }}>
            {!beginner && <div style={{ fontSize: 12, fontWeight: 800, color: "var(--blue)" }}>INPUT 2 ── パーソナライズ</div>}
            <h3 style={{ margin: beginner ? 0 : "2px 0 0", fontSize: 19, fontWeight: 900 }}>もっと正確にシミュレーション</h3>
          </div>
          <button onClick={onClose} style={{ border: "none", background: "var(--bg-2)", width: 34, height: 34, borderRadius: "50%", fontSize: 18, color: "var(--ink-2)" }}>×</button>
        </div>

        <div style={{ padding: "24px", display: "grid", gap: 22 }}>
          {/* 借入形態 */}
          <div className="card" style={{ padding: 20 }}>
            <div style={{ fontSize: 13.5, fontWeight: 800, marginBottom: 12 }}>借入の形態</div>
            <Segmented options={[{ value: false, label: "単独で借りる" }, { value: true, label: "ペアローン" }]} value={pair} onChange={setPair} />
            {pair && (
              <div className="rise" style={{ marginTop: 16 }}>
                <NumberField label="パートナーの月手取り" value={partnerTakeHome} onChange={setPartner} placeholder="例：30"
                  help="ペアローンの場合、2人の手取りを合算して返済可能額を計算します。" />
              </div>
            )}
          </div>

          {/* 用意できる資金 */}
          <div className="card" style={{ padding: 20 }}>
            <div style={{ fontSize: 13.5, fontWeight: 800, marginBottom: 12 }}>用意できる資金</div>
            {/* 貯蓄（読み取り専用） */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 14px", background: "var(--bg)", borderRadius: 10 }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: "var(--ink-2)" }}>あなたの貯蓄</span>
              <Yen value={savings || 0} digits={0} size={18} />
            </div>
            <div style={{ marginTop: 7, marginBottom: 16, fontSize: 11.5, color: "var(--muted)", lineHeight: 1.6 }}>
              ※ 最初の入力画面で入力した額です。変更する場合は「← 条件を変更」からどうぞ。
            </div>
            {/* 援助（任意） */}
            <NumberField label={beginner ? "親などからの援助はいくら？（任意）" : "親などからの援助（任意）"} value={gift} onChange={setGift} placeholder="0でもOK" />
            {!beginner && (
              <div style={{ marginTop: 10 }}>
                <InlineNote tone="blue">💡 <strong><AiTerm termKey="giftexempt">住宅取得資金贈与の非課税特例</AiTerm></strong>（最大1,000万円）が適用される可能性があります。詳細は税理士にご確認ください。</InlineNote>
              </div>
            )}
            {/* 合計 */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginTop: 16, padding: "12px 14px", background: "var(--blue-bg)", border: "1px solid var(--blue-line)", borderRadius: 10 }}>
              <span style={{ fontSize: 13, fontWeight: 800, color: "var(--ink)" }}>用意できる資金 合計</span>
              <span style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                <span style={{ fontSize: 11, color: "var(--muted)", fontWeight: 700 }} className="num">貯蓄{Calc.fmtMan(savings||0,0)}＋援助{Calc.fmtMan(giftN,0)}</span>
                <Yen value={available} digits={0} size={20} />
              </span>
            </div>
            {/* beginner：特例・初期費用判定は折りたたみで詳細へ（情報量を絞る／C-4）。詳細モードは従来どおり展開 */}
            {beginner ? (
              <div style={{ marginTop: 12 }}>
                <BandReveal title="贈与の非課税特例・初期費用の判定をみる">
                  <div style={{ display: "grid", gap: 10 }}>
                    <Callout tone="blue">
                      <strong className="lead-blue"><AiTerm termKey="giftexempt">住宅取得資金贈与の非課税特例</AiTerm></strong>（最大1,000万円）が適用される可能性があります。詳細は税理士にご確認ください。
                    </Callout>
                    {normalClosing != null && (
                      surplus >= 0 ? (
                        <Callout tone="green">
                          <strong className="lead-green">初期費用は払えます</strong>。無難ラインの初期費用（<strong style={{ fontWeight: 500 }}>{Calc.fmtMan(normalClosing,0)}万円</strong>）は用意できる資金で賄え、残り<strong style={{ fontWeight: 500 }}>{Calc.fmtMan(surplus,0)}万円</strong>を頭金に回せます。
                        </Callout>
                      ) : (
                        <Callout tone="red">
                          <strong className="lead-red">初期費用が不足します</strong>。無難ラインの初期費用（<strong style={{ fontWeight: 500 }}>{Calc.fmtMan(normalClosing,0)}万円</strong>）に対して<strong style={{ fontWeight: 500 }}>{Calc.fmtMan(Math.abs(surplus),0)}万円</strong>足りません。安全ラインでの検討をおすすめします。
                        </Callout>
                      )
                    )}
                  </div>
                </BandReveal>
              </div>
            ) : (
              normalClosing != null && (
                <div style={{ marginTop: 12 }}>
                  {surplus >= 0 ? (
                    <InlineNote tone="green">✅ 無難ラインの初期費用（<strong className="num">{Calc.fmtMan(normalClosing,0)}万円</strong>）は賄えます。残り<strong className="num" style={{ color: "var(--green)" }}>{Calc.fmtMan(surplus,0)}万円</strong>を頭金に回せます。</InlineNote>
                  ) : (
                    <InlineNote tone="amber">⚠️ 無難ラインの初期費用（<strong className="num">{Calc.fmtMan(normalClosing,0)}万円</strong>）に対して<strong className="num" style={{ color: "var(--amber)" }}>{Calc.fmtMan(Math.abs(surplus),0)}万円</strong>不足しています。安全ラインでの検討をおすすめします。</InlineNote>
                  )}
                </div>
              )
            )}
          </div>

          {/* ライフイベント */}
          <div className="card" style={{ padding: 20 }}>
            <div style={{ fontSize: 13.5, fontWeight: 800, marginBottom: 4 }}>ライフイベント</div>
            <p style={{ margin: "0 0 14px", fontSize: 12.5, color: "var(--ink-2)" }}>将来起こりうる出来事を追加すると、その時期の家計への影響を反映します。<strong style={{ color: "var(--ink)" }}>「子ども誕生」を先に追加</strong>すると、育休・教育費の時期を自動で提案します。</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
              {eventButtons.map(d => (
                <button key={d.type} onClick={() => addEvent(d.type)}
                  style={{ border: "1.5px solid var(--line-2)", background: "#fff", borderRadius: 999, padding: "8px 14px", fontSize: 13, fontWeight: 700, color: "var(--ink-2)", display: "inline-flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: 15 }}>{d.icon}</span>{d.label}<span style={{ color: "var(--blue)", fontWeight: 800 }}>＋</span>
                </button>
              ))}
            </div>
            <div style={{ display: "grid", gap: 10 }}>
              {events.length === 0 && <div style={{ fontSize: 12.5, color: "var(--muted)", textAlign: "center", padding: "12px 0" }}>まだイベントは追加されていません</div>}
              {events.map(ev => <EventEditor key={ev.id} ev={ev} onChange={(n) => updateEvent(ev.id, n)} onRemove={() => removeEvent(ev.id)} />)}
            </div>
          </div>
        </div>

        <div style={{ position: "sticky", bottom: 0, background: "var(--bg)", borderTop: "1px solid var(--line)", padding: "16px 24px" }}>
          <button onClick={apply} style={{ width: "100%", padding: 15, borderRadius: 12, border: "none", fontSize: 16, fontWeight: 800, color: "#fff", background: "var(--blue)", boxShadow: "0 6px 18px oklch(0.58 0.15 250 / .35)" }}>

        </div>

    </div>
  );
}

Object.assign(window, { SecondaryInput });

</script>

<script type="text/babel">
/* アウトプット4：ライフイベント反映 — 予算ラインを再計算し、影響を一覧＋家計の警告で示す */

// 各イベントの「月々の影響」テキスト
function monthlyImpact(ev, selfBase, partnerBase) {
  const def = Calc.EVENT_DEFS[ev.type];
  if (def.kind === "expense") {
    let s = `月 −${def.monthly}万円`;
    return { text: s, tone: "red" };
  }
  if (def.kind === "lump") {
    const lump = ev.lump != null ? ev.lump : def.lump;
    let s = def.monthly > 0 ? `月 −${def.monthly}万円（＋一時${lump}万円）` : `一時 −${lump}万円`;
    return { text: s, tone: "red" };
  }
  if (def.kind === "income_self") {
    const d = selfBase * (1 - Calc.leaveIncomeFactor(0));
    return { text: `月 −${Calc.fmtMan(d)}万円（一時的）`, tone: "red" };
  }
  if (def.kind === "income_partner") {
    const d = partnerBase * (1 - Calc.leaveIncomeFactor(0));
    return { text: `月 −${Calc.fmtMan(d)}万円（一時的）`, tone: "red" };
  }
  if (def.kind === "income_set_self" || def.kind === "income_set_partner") {
    const baseM = def.kind === "income_set_self" ? selfBase : partnerBase;
    const nm = Calc.monthlyTakeHomeFromAnnual(ev.newIncome || 0);
    const d = nm - baseM;
    return { text: `月 ${d >= 0 ? "＋" : "−"}${Calc.fmtMan(Math.abs(d))}万円`, tone: d >= 0 ? "green" : "red" };
  }
  return { text: "—", tone: "ink" };
}
function timingText(ev) {
  const def = Calc.EVENT_DEFS[ev.type];
  const dur = (def.kind === "income_self" || def.kind === "income_partner" || def.hasDuration) && ev.duration;
  return dur ? `${ev.year}年後・${ev.duration}年間` : `${ev.year}年後`;
}

function ImpactRow({ ev, selfBase, partnerBase, lineImpact, onRemove }) {
  const def = Calc.EVENT_DEFS[ev.type];
  const mi = monthlyImpact(ev, selfBase, partnerBase);
  const miColor = mi.tone === "green" ? "var(--green)" : mi.tone === "red" ? "var(--red)" : "var(--ink)";
  return (
    <tr style={{ borderTop: "1px solid var(--line)" }}>
      <td style={{ padding: "13px 14px", fontWeight: 700, whiteSpace: "nowrap" }}>
        <span style={{ marginRight: 6 }}>{def.icon}</span>{def.label}
      </td>
      <td style={{ padding: "13px 14px", color: "var(--ink-2)", fontSize: 12.5, whiteSpace: "nowrap" }}>{timingText(ev)}</td>
      <td style={{ padding: "13px 14px", textAlign: "right", fontWeight: 700, color: miColor, whiteSpace: "nowrap" }}>{mi.text}</td>
      <td style={{ padding: "13px 14px", textAlign: "right", fontWeight: 800, color: lineImpact > 0 ? "var(--red)" : "var(--muted)", whiteSpace: "nowrap" }} className="num">
        {lineImpact > 0 ? `−${Calc.fmtMan(lineImpact, 0)}` : "±0"}<span className="unit">万</span>
      </td>
      <td style={{ padding: "13px 6px 13px 14px", textAlign: "right" }}>
        <button onClick={onRemove} title="このイベントを除外" style={{ border: "none", background: "var(--bg-2)", color: "var(--muted)", width: 24, height: 24, borderRadius: "50%", fontSize: 14, fontWeight: 700, lineHeight: 1 }}>×</button>
      </td>
    </tr>
  );
}

function OutputImpact({ inp, selfBase, partnerBase, mgmt, years, events, baseBudget, refHousing, safePriceFor, onRemoveEvent, onEdit, normalPrice, rateBumpTo, rateBumpMonthly }) {
  const basePrice = safePriceFor([]);
  const cf = Calc.cashflow({
    selfBase, partnerBase, existingLoan: inp.existingLoan, years, events,
    housing: refHousing,
    price: normalPrice, isNew: !Calc.PROPERTY_TYPES[inp.typeKey].isUsed,
  });
  const worst = cf.worst;
  const deficit = cf.deficitRange;

  // 主因イベント（worst年に効いている収入減イベント）
  const causeEv = events.find(e => {
    const d = Calc.EVENT_DEFS[e.type];
    if (!d.kind.includes("income")) return false;
    if (d.kind.includes("set")) return e.year <= worst.year;
    const end = e.year + (e.duration || 1);
    return worst.year >= e.year && worst.year < end;
  }) || events.find(e => Calc.EVENT_DEFS[e.type].kind.includes("income"))
    || events.find(e => Calc.EVENT_DEFS[e.type].kind === "expense");
  const causeLabel = causeEv ? Calc.EVENT_DEFS[causeEv.type].label : "ライフイベント";

  return (
    <section style={{ marginTop: 56 }}>
      <SectionHead kicker="OUTPUT 4 ── ライフイベント反映" title="ライフイベントを踏まえると、予算はこう変わる。"
        sub="追加したライフイベントで支出が最も重なる時期（例：子の誕生と重なる1年目）を基準に、上の3つの予算ラインを再計算しました。各イベントが予算に与えた影響と、家計が苦しくなる時期を確認できます。" />

      {/* 3-a. イベント別インパクト */}
      <div className="card" style={{ padding: "6px 0 8px", overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5, minWidth: 540 }}>
          <thead>
            <tr style={{ color: "var(--muted)", fontSize: 11.5 }}>
              <th style={{ padding: "12px 14px", fontWeight: 700, textAlign: "left" }}>イベント</th>
              <th style={{ padding: "12px 14px", fontWeight: 700, textAlign: "left" }}>時期</th>
              <th style={{ padding: "12px 14px", fontWeight: 700, textAlign: "right" }}>月々の影響</th>
              <th style={{ padding: "12px 14px", fontWeight: 700, textAlign: "right" }}>安全ラインへの影響</th>
              <th style={{ width: 36 }}></th>
            </tr>
          </thead>
          <tbody>
            {events.map(ev => (
              <ImpactRow key={ev.id} ev={ev} selfBase={selfBase} partnerBase={partnerBase}
                lineImpact={Math.max(0, basePrice - safePriceFor([ev]))}
                onRemove={() => onRemoveEvent(ev.id)} />
            ))}
          </tbody>
        </table>
      </div>
      <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 12 }}>
        <button onClick={onEdit} style={{ border: "1px solid var(--line-2)", background: "#fff", color: "var(--ink-2)", borderRadius: 999, padding: "9px 18px", fontSize: 13, fontWeight: 700 }}>
          ✎ ライフイベントを編集・追加
        </button>
      </div>

      {/* 3-b. 家計の警告／余裕 + 総括 */}
      <div style={{ marginTop: 20 }} className="rise">
        {deficit && (
          <div className="card" style={{ padding: 22, border: "1px solid var(--red-line)", background: "var(--red-bg)" }}>
            <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
              <span style={{ fontSize: 22 }}>⚠️</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 15.5, fontWeight: 800, color: "var(--red)", marginBottom: 6, lineHeight: 1.5 }}>
                  購入後{deficit[0] === deficit[1] ? `${deficit[0]}年目` : `${deficit[0]}〜${deficit[1]}年目`}は、毎月の家計が約<span className="num">{Calc.fmtMan(Math.abs(worst.balance), 0)}</span>万円の赤字（貯蓄の切り崩し）になる見込みです
                </div>
                <p style={{ margin: "0 0 14px", fontSize: 13.5, color: "var(--ink-2)", lineHeight: 1.65 }}>
                  主な原因は「{causeLabel}」による収入減です。この時期を乗り切るために、以下の対策を検討してみてください。
                </p>
                <div style={{ display: "grid", gap: 8 }}>
                  <Advice text="頭金を増やして借入額を抑える（毎月の返済そのものを下げる）" />
                  <Advice text="ローン期間を長めにして、月々の返済を平準化する" />
                  <Advice text="物件予算を1〜2ランク下げ、安全ライン以下に収める" />
                </div>
              </div>
            </div>
          </div>
        )}
        <LifeSummary normalPrice={normalPrice} deficit={deficit} worst={worst} causeLabel={causeLabel}
          rateBumpTo={rateBumpTo} rateBumpMonthly={rateBumpMonthly} withWarning={!!deficit} />
      </div>

      <p style={{ marginTop: 14, fontSize: 11.5, color: "var(--muted)", lineHeight: 1.7 }}>
        ※ 家計の収支は「手取り − ローン返済 − 管理費等 − 生活費（手取りの65%概算）− イベント支出」で試算しています。生活費はご家庭により異なります。
      </p>
    </section>
  );
}
/* D-2：Q4末尾の総括ブロック。プロダクト全体の主張（=あなたの予算はこうなる）と揃える。
   B-13の「余裕」表現もここに吸収し、独り歩きさせない。 */
function LifeSummary({ normalPrice, deficit, worst, causeLabel, rateBumpTo, rateBumpMonthly, withWarning }) {
  return (
    <div className="card" style={{ marginTop: withWarning ? 14 : 0, padding: "20px 22px", border: "1px solid var(--blue-line)", background: "var(--blue-bg)" }}>
      <div style={{ fontSize: 11.5, fontWeight: 800, letterSpacing: ".06em", color: "var(--blue)", marginBottom: 8 }}>このシミュレーションのまとめ</div>
      <p style={{ margin: 0, fontSize: 17, fontWeight: 800, lineHeight: 1.6, color: "var(--ink)", textWrap: "pretty" }}>
        ライフイベントを踏まえると、無理なく買える物件価格は <span className="num" style={{ color: "var(--blue)" }}>{Calc.fmtMan(normalPrice, 0)}万円</span>（無難ライン）です。
      </p>
      <p style={{ margin: "10px 0 0", fontSize: 13.5, color: "var(--ink-2)", lineHeight: 1.75 }}>
        {deficit ? (
          <>支出が最も重なる{deficit[0] === deficit[1] ? `${deficit[0]}年目` : `${deficit[0]}〜${deficit[1]}年目`}は、家計が月約<span className="num">{Calc.fmtMan(Math.abs(worst.balance), 0)}</span>万円の赤字になりやすい時期です。頭金を増やす・予算を下げるなどで備えておくと安心です。</>
        ) : (
          <>{rateBumpTo ? <>金利が{rateBumpTo.toFixed(1)}%まで上がっても月＋<span className="num">{Calc.fmtMan(rateBumpMonthly)}</span>万円、</> : null}支出が最も重なる{worst.year}年目でも、毎月約<span className="num" style={{ fontWeight: 800, color: "var(--green)" }}>{Calc.fmtMan(Math.max(0, worst.balance), 0)}</span>万円を残せる見込みで、家計はもちます。</>
        )}
      </p>
    </div>
  );
}
function Advice({ text }) {
  return (
    <div style={{ display: "flex", gap: 8, alignItems: "flex-start", background: "#fff", border: "1px solid var(--line-2)", borderRadius: 9, padding: "10px 13px", fontSize: 13, lineHeight: 1.55 }}>
      <span style={{ color: "var(--blue)", fontWeight: 800 }}>→</span><span>{text}</span>
    </div>

}

<script type="text/babel">
/* 初心者モード ── 「減らす・段階的に出す・意味に翻訳する」
   計算層・データは detailed と完全共通。ここは「何を見せるか」だけを制御する。
   各展開は detailed で使う既存コンポーネント（OutputBudget / BudgetCard / OutputRate /
   OutputExit / ClosingBreakdown 等）をそのまま再利用する（重複実装・数値ズレ防止）。 */
const { useState: useStateBeg } = React;

/* 結論1文（図表の上に必ず先に置く＝図は根拠、文が主役）―結論variantのコールアウトに統一 */
function ConclusionLine({ children }) {
  return <Callout tone="conclusion" style={{ marginBottom: 18 }}>{children}</Callout>;
}

/* 問い見出し ＋「答えを見る →」。押すと結論1文＋既存の中身を展開 */
function RevealSection({ n, q, teaser, open, onOpen, conclusion, children }) {
  return (
    <div style={{ marginTop: 40 }}>
      <QHeading n={n} q={q} />
      {open ? (
        <div className="rise">
          <ConclusionLine>{conclusion}</ConclusionLine>
          {children}
        </div>
      ) : (
        <QPromptRow teaser={teaser} cta="答えを見る →" onClick={onOpen} />
      )}
    </div>
  );
}

/* Q1 初期：無難ライン1枚だけ（物件価格・月々合計の2要素＋翻訳）。
   詳細・他ラインは既存コンポーネントをそのまま展開 */
function BeginnerBudget({ budget, isMansion, savings, isUsed, baseBudget, drop, onShowAll }) {
  const showDrop = drop > 1;
  return (
    <section>
      <div style={{ maxWidth: 540 }}>
        <BudgetCard data={budget.normal} emphasized compact isMansion={isMansion} savings={savings} baseLine={baseBudget && baseBudget.normal} />
      </div>

      {showDrop && (
        <div className="rise" style={{ marginTop: 16, maxWidth: 540 }}>
          <Callout tone="neutral">
            ライフイベントを考慮すると、無理なく買える価格帯は約 <strong className="num" style={{ fontWeight: 500 }}>{Calc.fmtMan(drop, 0)}万円</strong> 下がります。一番きつい時期を基準にした安全側の見直しです。
          </Callout>
        </div>
      )}

      <div style={{ marginTop: 16 }}>
        <button onClick={onShowAll}
          style={{ border: "1px solid var(--line-2)", background: "#fff", color: "var(--ink-2)", borderRadius: 999, padding: "11px 20px", fontSize: 13.5, fontWeight: 700 }}>
          安全・限界ラインも見る →
        </button>
      </div>

      <div style={{ marginTop: 18, maxWidth: 540 }}>
        <BandReveal title="初期費用（諸費用）の内訳を見る">
          <ClosingBreakdown items={budget.normal.closingItems} total={budget.normal.closing} isUsed={isUsed} />
        </BandReveal>
      </div>
    </section>
  );
}

/* 初心者モード全体：結論 → Q1（最小） → Q2/Q3（オンデマンド） → Q4（既存トリガー） */
function BeginnerView({ conclusionEl, budget, budgetBase, drop, isMansion, availableFunds, isUsed, events, rateNode, exitNode, lifeNode, onOpenSecondary, q2Conclusion, q3Conclusion, secondaryHasEvents }) {
  const [showAllLines, setShowAllLines] = useStateBeg(false);
  const [rateOpen, setRateOpen] = useStateBeg(false);
  const [exitOpen, setExitOpen] = useStateBeg(false);

  return (
    <div>
      {conclusionEl}

      {/* Q1：で、結局いくらの家が買える？ */}
      <div>
        <QHeading n={1} q="で、結局いくらの家が買える？" />
        {showAllLines ? (
          <div className="rise">
            <OutputBudget budget={budget} isMansion={isMansion} savings={availableFunds} isUsed={isUsed}
              baseBudget={events.length ? budgetBase : null} drop={events.length ? drop : 0} />
            <div style={{ marginTop: 14 }}>
              <button onClick={() => setShowAllLines(false)}
                style={{ border: "1px solid var(--line-2)", background: "#fff", color: "var(--ink-2)", borderRadius: 999, padding: "10px 18px", fontSize: 13, fontWeight: 700 }}>
                ← 無難ラインだけ表示にもどす
              </button>
            </div>
          </div>
        ) : (
          <BeginnerBudget budget={budget} isMansion={isMansion} savings={availableFunds} isUsed={isUsed}
            baseBudget={events.length ? budgetBase : null} drop={events.length ? drop : 0}
            onShowAll={() => setShowAllLines(true)} />
        )}
      </div>

      {/* Q2：金利が上がったら、詰む？ */}
      <RevealSection n={2} q="金利が上がったら、詰む？"
        teaser="金利が上がると、毎月の返済はどのくらい増える？ 過去に実際あった5つの水準で確かめます。"
        open={rateOpen} onOpen={() => setRateOpen(true)} conclusion={q2Conclusion}>
        {rateNode}
      </RevealSection>

      {/* Q3：数年で売ったら、損する？ */}
      <RevealSection n={3} q="数年で売ったら、損する？"
        teaser="転勤・家族構成の変化など、ライフステージの変化で住み替えが必要になった場合に、その時点で売ったら手元にお金が残るか／持ち出しになるかを試算します。"
        open={exitOpen} onOpen={() => setExitOpen(true)} conclusion={q3Conclusion}>
        {exitNode}
      </RevealSection>

      {/* Q4：自分の人生だと、どう変わる？（既存トリガーのまま） */}
      <div style={{ marginTop: 40 }}>
        <QHeading n={4} q="自分の人生だと、どう変わる？" />
        {secondaryHasEvents ? lifeNode : (
          <QPromptRow
            teaser="ペアローン・頭金・ライフイベント（出産・育休・転職・結婚など）を加えると、支出が最も重なる時期を基準に予算を見直します。"
            cta="ライフイベントを反映する →" onClick={onOpenSecondary} />
        )}
      </div>
    </div>
  );
}

Object.assign(window, { BeginnerView });

</script>

  const [ctrlOpen, setCtrlOpen] = useStateApp(false);
  const [mode, setMode] = useStateApp("C");      // 出力方式：C案（1問1答）を採用
  const [viewMode, setViewMode] = useStateApp("newui"); // 公開リリース：新UI（lux-skin）に固定。トグルは非表示
  const [step, setStep] = useStateApp(0);         // 現在のステップ（A=表示中 / B,C=開示済み最終）
  const budgetRef = useRefApp(null), out4Ref = useRefApp(null), stepTopRef = useRefApp(null);

  React.useEffect(() => {
    const force = /[?&]m=1/.test(window.location.search);
    const onResize = () => setIsMobile(force || window.innerWidth < 760);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  const maxYears = inp ? Calc.maxLoanYears(inp.age) : 40;
  const minYears = Math.min(25, maxYears);
  const isMansion = inp ? Calc.PROPERTY_TYPES[inp.typeKey].isMansion : false;
  const basePct = inp ? Calc.depreciationPct(inp.typeKey, inp.bandKey) : -1;

  const start = (data) => {
    setInp(data);
    const yrs = Math.min(35, Calc.maxLoanYears(data.age));
    const dp = Calc.suggestedDownPayment(data.savings, data.takeHome);
    setS({ downPayment: dp, years: yrs, rate: Calc.BASE_RATE, sellYear: 10 });
    setHasSecondary(false);
    setSecondary({ pair: false, partnerTakeHome: 0, selfFund: 0, gift: 0, downPayment: 0, events: [] });
    setMode("C"); setStep(0);
    setLoading(true);
    setScreen("results");
    setTimeout(() => setLoading(false), 650);
    setTimeout(() => window.scrollTo({ top: 0 }), 0);
  };

  // 予算計算（ペアローンなら世帯収入を合算）
  const effInp = useMemo(() => {
    if (!inp) return null;
    const extra = secondary.pair ? secondary.partnerTakeHome : 0;
    return { ...inp, takeHome: inp.takeHome + extra };
  }, [inp, secondary]);

  // ---- 予算計算：ベース（イベントなし）と アクティブ（ボトルネック手取り） ----
  const pairPartner = secondary.pair ? (secondary.partnerTakeHome || 0) : 0;
  const events = secondary.events || [];
  const budgetBase = useMemo(
    () => effInp ? Calc.budget(effInp, { downPayment: s.downPayment, years: s.years, rate: s.rate }) : null,
    [effInp, s.downPayment, s.years, s.rate]
  );
  const bottleneck = useMemo(
    () => effInp ? Calc.bottleneckTakeHome(inp.takeHome, pairPartner, s.years, events) : 0,
    [effInp, inp, pairPartner, s.years, events]
  );
  const budgetActive = useMemo(() => {
    if (!effInp) return null;
    if (!events.length) return budgetBase;
    return Calc.budget({ ...effInp, takeHome: bottleneck }, { downPayment: s.downPayment, years: s.years, rate: s.rate });
  }, [effInp, budgetBase, events.length, bottleneck, s.downPayment, s.years, s.rate]);
  const budget = budgetActive;
  // 各イベント単体での安全ライン価格（影響額の算出用）
  const safePriceFor = (evs) => {
    if (!effInp) return 0;
    const bn = Calc.bottleneckTakeHome(inp.takeHome, pairPartner, s.years, evs);
    return Calc.budget({ ...effInp, takeHome: bn }, { downPayment: s.downPayment, years: s.years, rate: s.rate }).safe.price;
  };
  const drop = budget && budgetBase ? Math.max(0, budgetBase.normal.price - budget.normal.price) : 0;

  const scrollToRef = (ref) => {
    const el = ref.current;
    if (!el) return;
    const y = el.getBoundingClientRect().top + window.scrollY - 84;
    window.scrollTo({ top: y, behavior: "smooth" });
  };

  const changeMode = (m) => { setMode(m); setStep(0); setTimeout(() => window.scrollTo({ top: 0, behavior: "smooth" }), 0); };

  const applySecondary = (data) => {
    setSecondary(data);
    setHasSecondary(true);
    setSecondaryOpen(false);
    const avail = inp.savings + (data.gift || 0);
    const dp = Math.min(Calc.suggestedDownPayment(avail, inp.takeHome, budget && budget.normal ? budget.normal.closing : 0), Math.round(avail / 10) * 10);
    setS(prev => ({ ...prev, downPayment: dp }));
    setAnimToken(t => t + 1);
    const hasEvents = data.events && data.events.length;
    // ① ライフイベント反映後は OUTPUT 1 から順に確認できるように
    if (hasEvents) setStep(mode === "A" ? 0 : 3);
    setTimeout(() => {
      if (mode === "A") window.scrollTo({ top: 0, behavior: "smooth" });
      else scrollToRef(budgetRef);
    }, 80);
    setToast(hasEvents
      ? "ライフイベントを反映しました。OUTPUT 1 から順に確認できます"
      : "条件を反映し、すべての項目を更新しました");
  };

  // イベント除外：数字アニメのみ＋トースト（スクロールなし）
  const removeEvent = (id) => {
    setSecondary(prev => ({ ...prev, events: prev.events.filter(e => e.id !== id) }));
    setAnimToken(t => t + 1);
    setToast("ライフイベントを除外し、各項目を再計算しました");
  };

  if (screen === "input") {
    return (
      <div className="wrap" style={{ padding: "56px 20px 80px", minHeight: "100vh", display: "flex", alignItems: "center" }}>
        <div style={{ width: "100%" }}>
          <InputForm onSubmit={start} />
        </div>
      </div>
    );
  }

  const normal = budget.normal;
  const mgmt = isMansion ? Calc.mansionMonthly(inp.typeKey, inp.bandKey).total : 0;
  const compAge = inp.age + s.years;
  const giftAmt = secondary.gift || 0;
  const availableFunds = inp.savings + giftAmt;
  const diag = Calc.diagnose(inp, budgetBase);
  const blocked = diag.code === "low_income" || diag.code === "excess_loan";
  const aiCtx = { inp: effInp, line: normal, rate: s.rate, years: s.years, sellYear: s.sellYear, basePct };

  // ---- 初心者モード：数字→意味の「結論1文」（既存の計算結果を差し込むだけ） ----
  const rateScn = Calc.rateScenarios(normal.loan, s.years, s.rate);
  const rBase = rateScn.find(x => x.isBase) || rateScn[2];
  const rHi = rateScn.filter(x => x.rate > rBase.rate + 0.001).sort((a, b) => a.rate - b.rate)[0];
  const rDM = rHi ? rHi.monthly - rBase.monthly : 0;
  const rDT = rHi ? rHi.total - rBase.total : 0;
  const q2Safe = rHi ? ((rHi.monthly + mgmt) / effInp.takeHome * 100) <= 35 : true;
  const q2Conclusion = rHi
    ? `金利が${rHi.rate.toFixed(1)}%に上がっても、月＋${Calc.fmtMan(rDM)}万・${s.years}年で＋${Calc.fmtMan(rDT, 0)}万。${q2Safe ? "無難ラインを選んでいれば、無理なく吸収できる範囲です。" : "負担が大きくなるため、借入額や頭金で余裕を持たせると安心です。"}`
    : `いまの金利水準なら、毎月の返済額は安定しています。`;
  const exSum = Calc.exitSummary(normal.price, normal.loan, s.rate, s.years, s.sellYear, basePct);
  const q3Conclusion = exSum.crash.net >= 0
    ? `${s.sellYear}年後に売れば、リーマン級の暴落シナリオでも手元にお金が残る計算です。出口の心配は小さい水準です。`
    : `${s.sellYear}年後に売ると、暴落シナリオで最大${Calc.fmtMan(Math.abs(exSum.crash.net), 0)}万の持ち出しが出る可能性。頭金か予算の調整で小さくできます。`;
  const secondaryHasEvents = hasSecondary && events.length > 0;

  const conclusionEl = (
    <ConclusionBanner normalPrice={budget.normal.price}
      pessNet={Calc.exitSummary(budget.normal.price, budget.normal.loan, s.rate, s.years, s.sellYear, basePct).pess.net}
      sellYear={s.sellYear} isMansion={isMansion} />
  );

  const budgetNode = (
    <div ref={budgetRef} style={{ scrollMarginTop: 84 }}>
      <OutputBudget budget={budget} isMansion={isMansion} savings={availableFunds}
        isUsed={Calc.PROPERTY_TYPES[inp.typeKey].isUsed}
        baseBudget={events.length ? budgetBase : null} drop={events.length ? drop : 0} />
    </div>
  );
  const rateNode = <OutputRate loan={normal.loan} years={s.years} baseRate={s.rate} />;
  const exitNode = (
    <OutputExit price={normal.price} loan={normal.loan} rate={s.rate} years={s.years} basePct={basePct} typeKey={inp.typeKey}
      sellYear={s.sellYear} setSellYear={(v) => setS({ ...s, sellYear: v })} beginner={viewMode !== "detailed"} />
  );
  const lifeNode = !hasSecondary ? (
    <div style={{ textAlign: "center", padding: "20px 0 8px" }}>
      <div style={{ fontSize: 22, fontWeight: 900, marginBottom: 8 }}>自分の人生だと、どう変わる？</div>
      <p style={{ margin: "0 auto 18px", fontSize: 13.5, color: "var(--ink-2)", maxWidth: 460, lineHeight: 1.7 }}>
        <AiTerm termKey="pair">ペアローン</AiTerm>・<AiTerm termKey="down">頭金</AiTerm>・ライフイベント（出産・育休・転職・結婚など）を加えると、支出が最も重なる時期を基準に予算を見直します。
      </p>
      <button onClick={() => setSecondaryOpen(true)} style={{ border: "none", background: "var(--blue)", color: "#fff", borderRadius: 12, padding: "15px 28px", fontSize: 15.5, fontWeight: 800, boxShadow: "0 6px 18px oklch(0.58 0.15 250 / .3)" }}>
        ライフイベントを反映する →
      </button>
    </div>
  ) : events.length > 0 ? (
    <div ref={out4Ref} style={{ scrollMarginTop: 84 }}>
      <OutputImpact inp={inp} selfBase={inp.takeHome} partnerBase={pairPartner} mgmt={mgmt}
        years={s.years} events={events} baseBudget={budgetBase}
        refHousing={budget.normal.loanMonthly + mgmt}
        normalPrice={budget.normal.price} rateBumpTo={rHi ? rHi.rate : null} rateBumpMonthly={rDM}
        safePriceFor={safePriceFor} onRemoveEvent={removeEvent} onEdit={() => setSecondaryOpen(true)} />
    </div>
  ) : (
    <div style={{ display: "flex", justifyContent: "center", padding: "20px 0" }}>
      <button onClick={() => setSecondaryOpen(true)} style={{ border: "1px solid var(--line-2)", background: "#fff", color: "var(--ink-2)", borderRadius: 999, padding: "11px 20px", fontSize: 13.5, fontWeight: 700 }}>
        ✎ ライフイベントを追加して家計の影響を見る
      </button>
    </div>
  );

  const stepDefs = [
    { key: "budget", short: "予算", q: "で、結局いくらの家が買える？", cta: "金利が上がったら？を見る", node: budgetNode },
    { key: "rate", short: "金利", q: "金利が上がったら、詰む？", cta: "数年で売ったら損する？を見る", node: rateNode },
    { key: "exit", short: "売却", q: "数年で売ったら、損する？", cta: "自分の人生で考える", node: exitNode },
    { key: "life", short: "人生", q: "自分の人生だと、どう変わる？", cta: null, node: lifeNode },
  ];
  const total = stepDefs.length;
  const sectionGap = { marginTop: 40 };

  let stepperBody;
  if (mode === "A") {
    stepperBody = (
      <div>
        <div className="rise" key={step}>{stepDefs[step].node}</div>
        <WizardNav step={step} total={total} labels={stepDefs.map(d => d.short)}
          onPrev={() => { setStep(s2 => Math.max(0, s2 - 1)); window.scrollTo({ top: 0, behavior: "smooth" }); }}
          onNext={() => { setStep(s2 => Math.min(total - 1, s2 + 1)); window.scrollTo({ top: 0, behavior: "smooth" }); }} />
      </div>
    );
  } else if (mode === "B") {
    stepperBody = (
      <div>
        {stepDefs.slice(0, step + 1).map((d, i) => (
          <div key={d.key} style={i > 0 ? sectionGap : null} className={i === step ? "rise" : ""}>{d.node}</div>
        ))}
        {step < total - 1 && (
          <div style={{ textAlign: "center", margin: "32px 0 8px" }}>
            <button onClick={() => { setStep(step + 1); }}
              style={{ border: "1.5px solid var(--blue)", background: "#fff", color: "var(--blue)", borderRadius: 999, padding: "13px 26px", fontSize: 14.5, fontWeight: 800 }}>
              ＋ {stepDefs[step].cta}
            </button>
          </div>
        )}
      </div>
    );
  } else {
    stepperBody = (
      <div>
        {stepDefs.slice(0, step + 1).map((d, i) => (
          <div key={d.key} style={i > 0 ? sectionGap : null} className={i === step ? "rise" : ""}>
            <QHeading n={i + 1} q={d.q} />
            {d.node}
          </div>
        ))}
        {step < total - 1 && (
          <div style={{ margin: "32px 0 8px", padding: "18px 20px", background: "var(--bg-2)", borderRadius: 14, display: "flex", flexWrap: "wrap", alignItems: "center", gap: 14 }}>
            <div style={{ flex: 1, minWidth: 200 }}>
              <div style={{ fontSize: 11.5, fontWeight: 800, color: "var(--muted)" }}>次の疑問</div>
              <div style={{ fontSize: 16, fontWeight: 800 }}>{stepDefs[step + 1].q}</div>
            </div>
            <button onClick={() => { setStep(step + 1); }}
              style={{ border: "none", background: "var(--ink)", color: "#fff", borderRadius: 999, padding: "12px 22px", fontSize: 13.5, fontWeight: 800 }}>
              答えを見る →
            </button>
          </div>
        )}
      </div>
    );
  }

  return (
    <div className={viewMode === "newui" ? "lux-root" : undefined}>
      {/* 最上部：戻る + コンテキスト */}
      <div className="wrap" style={{ padding: "22px 20px 14px", display: "flex", flexWrap: "wrap", gap: 12, alignItems: "center" }}>
        <button onClick={() => setScreen("input")} style={{ border: "1px solid var(--line-2)", background: "#fff", borderRadius: 999, padding: "7px 14px", fontSize: 12.5, fontWeight: 700, color: "var(--ink-2)", whiteSpace: "nowrap", flex: "none" }}>← 条件を変更</button>
        <div style={{ fontSize: 12.5, color: "var(--ink-2)" }}>
          {Calc.PROPERTY_TYPES[inp.typeKey].label} ／ 月手取り {Calc.fmtMan(effInp.takeHome, 0)}万 ／ {inp.age}歳
          {!blocked && <span> ／ 完済時 <strong style={{ color: compAge > 65 ? "var(--amber)" : "var(--ink-2)" }}>{compAge}歳</strong></span>}
          {secondary.pair && <span style={{ color: "var(--blue)", fontWeight: 700 }}>　ペアローン</span>}
        </div>
        {/* 公開リリース：表示モードトグル（初心者向け／新UI／詳しく見る）は非表示。
            常に新UI（lux-skin）で表示する。ViewModeToggle のコードは残置。 */}
      </div>

      {blocked ? (
        <div className="wrap" style={{ padding: "20px 20px 0" }}>
          <HonestNotice code={diag.code} inp={inp} budget={budgetBase} />
        </div>
      ) : (
      <>
      <StickyControls s={s} setS={setS} maxYears={maxYears} minYears={minYears} funds={availableFunds} takeHome={inp.takeHome} mobile={isMobile} forceCollapse={viewMode !== "detailed"} open={ctrlOpen} setOpen={setCtrlOpen} aiCtx={aiCtx} lux={viewMode === "newui"} />

      {compAge >= 66 && (
        <div className="wrap" style={{ padding: "12px 20px 0" }}>
          {compAge >= 71 ? (
            <InlineNote tone="amber">⚠️ 完済時 <strong>{compAge}歳</strong>と長期の計画です。この年齢帯は団信（団体信用生命保険）や審査が厳しくなりがちです。繰り上げ返済や退職金活用の見通しを、事前に確認しておきましょう。</InlineNote>
          ) : (
            <InlineNote tone="blue">ℹ️ 完済時 <strong>{compAge}歳</strong>の計画です。定年後も返済が続く場合は、繰り上げ返済や退職金での一括返済を視野に入れておくと安心です。</InlineNote>
          )}
        </div>
      )}

      <div className="wrap" style={{ padding: isMobile ? "24px 16px 0" : "32px 20px 0" }}>
        {loading ? (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 16, padding: "120px 0" }}>
            <div className="spin" />
            <div style={{ fontSize: 14, color: "var(--ink-2)", fontWeight: 700 }}>あなたの条件で計算しています…</div>
          </div>
        ) : (
          <AnimContext.Provider value={animToken}>
          <AiCtxContext.Provider value={aiCtx}>
            {viewMode === "beginner" || viewMode === "newui" ? (
              <BeginnerContext.Provider value={true}>
              <div className={viewMode === "newui" ? "lux-skin" : "notion-skin"}>
              <BeginnerView
                conclusionEl={conclusionEl}
                budget={budget} budgetBase={budgetBase} drop={drop}
                isMansion={isMansion} availableFunds={availableFunds}
                isUsed={Calc.PROPERTY_TYPES[inp.typeKey].isUsed}
                events={events} rateNode={rateNode} exitNode={exitNode} lifeNode={lifeNode}
                onOpenSecondary={() => setSecondaryOpen(true)}
                q2Conclusion={q2Conclusion} q3Conclusion={q3Conclusion}
                secondaryHasEvents={secondaryHasEvents} />
              </div>
              </BeginnerContext.Provider>
            ) : (
              <>
                {conclusionEl}
                {stepperBody}
              </>
            )}
          </AiCtxContext.Provider>
          </AnimContext.Provider>
        )}
      </div>
      </>
      )}

      <Footer />

      {secondaryOpen && (
        <SecondaryInput initial={secondary} onApply={applySecondary} onClose={() => setSecondaryOpen(false)} savings={inp.savings} normalClosing={budget.normal.closing} beginner={viewMode !== "detailed"} />
      )}

      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

Object.assign(window, { QHeading });

/* =====================================================================
   公開リリース対応（超少数の知人向け）
   ・合言葉ゲート：アプリ表示前の簡易パスワード（クライアント側チェックのみ）
   ・データ非保存：認証・入力状態はすべて React State（メモリ）。localStorage 不使用。
     → リロード・別タブ・別URLアクセスで合言葉・入力内容は消える。
   ・エラー耐性：ErrorBoundary で万一のクラッシュを捕捉し、前向きな案内を表示。
   ===================================================================== */

// 合言葉（公開リリース用・ソース内定数）。公開前にこの値を変更してください。
const APP_PASSWORD = "nikukyu0514";

function Gate({ onUnlock }) {
  const [pw, setPw] = useStateApp("");
  const [err, setErr] = useStateApp(false);
  const submit = () => {
    if (pw === APP_PASSWORD) { setErr(false); onUnlock(); }
    else setErr(true);
  };
  return (
    <div className="wrap" style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "40px 20px" }}>
      <div className="card rise" style={{ width: "100%", maxWidth: 400, padding: 32, textAlign: "center" }}>
        <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "var(--blue-bg)", color: "var(--blue)", padding: "6px 14px", borderRadius: 999, fontSize: 12.5, fontWeight: 800, marginBottom: 18 }}>
          住宅購入リスクシミュレーター
        </div>
        <h1 style={{ margin: "0 0 8px", fontSize: 21, fontWeight: 900, letterSpacing: "-.01em" }}>合言葉を入力してください</h1>
        <p style={{ margin: "0 0 22px", fontSize: 13, color: "var(--ink-2)", lineHeight: 1.7 }}>
          このページは限られた方向けの試作版です。<br />お知らせした合言葉を入力してください。
        </p>
        <input
          type="password" value={pw} autoFocus
          placeholder="合言葉"
          onChange={(e) => { setPw(e.target.value); setErr(false); }}
          onKeyDown={(e) => { if (e.key === "Enter") submit(); }}
          style={{
            width: "100%", padding: "13px 14px", textAlign: "center",
            border: `1.5px solid ${err ? "var(--red)" : "var(--line-2)"}`, borderRadius: 10,
            fontSize: 16, fontWeight: 700, color: "var(--ink)", background: "#fff", outline: "none",
            transition: "border-color .15s",
          }}
        />
        {err && (
          <div style={{ display: "flex", gap: 6, justifyContent: "center", alignItems: "center", marginTop: 10, fontSize: 12.5, color: "var(--red)", fontWeight: 600 }}>
            <span>⚠️</span><span>合言葉が違うようです。もう一度お試しください。</span>
          </div>
        )}
        <button onClick={submit}
          style={{
            marginTop: 18, width: "100%", padding: "15px", borderRadius: 12, border: "none",
            fontSize: 15.5, fontWeight: 800, color: "#fff", background: "var(--blue)",
            boxShadow: "0 6px 18px oklch(0.58 0.15 250 / .35)", cursor: "pointer",
          }}>
          はじめる →
        </button>
        <p style={{ margin: "16px 0 0", fontSize: 11, color: "var(--muted)", lineHeight: 1.6 }}>
          これは試作版です。入力データは保存されません。
        </p>
      </div>
    </div>
  );
}

function ErrorFallback({ onReset }) {
  return (
    <div className="wrap" style={{ minHeight: "60vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "40px 20px" }}>
      <div className="card rise" style={{ width: "100%", maxWidth: 440, padding: 32, textAlign: "center" }}>
        <div style={{ fontSize: 38, marginBottom: 10 }}>🌱</div>
        <h2 style={{ margin: "0 0 10px", fontSize: 20, fontWeight: 900, lineHeight: 1.4 }}>うまく表示できませんでした</h2>
        <p style={{ margin: "0 0 22px", fontSize: 14, color: "var(--ink-2)", lineHeight: 1.75 }}>
          入力の組み合わせによっては、計算がうまくいかないことがあります。<br />
          条件を少し変えて、もう一度試してみてください。何度でもやり直せます。
        </p>
        <button onClick={onReset}
          style={{ width: "100%", padding: "15px", borderRadius: 12, border: "none", fontSize: 15.5, fontWeight: 800, color: "#fff", background: "var(--blue)", boxShadow: "0 6px 18px oklch(0.58 0.15 250 / .35)", cursor: "pointer" }}>
          最初からやり直す
        </button>
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false }; }
  static getDerivedStateFromError() { return { hasError: true }; }
  componentDidCatch(error, info) { try { console.error("[App] 表示エラー:", error, info); } catch (e) {} }
  render() {
    if (this.state.hasError) {
      return <ErrorFallback onReset={() => { this.props.onReset && this.props.onReset(); this.setState({ hasError: false }); }} />;
    }
    return this.props.children;
  }
}

// 認証状態はメモリのみ。App は key で完全リマウントしてエラーから復帰（認証は維持）。
function Root() {
  const [authed, setAuthed] = useStateApp(false);
  const [appKey, setAppKey] = useStateApp(0);
  if (!authed) return <Gate onUnlock={() => setAuthed(true)} />;
  return (
    <ErrorBoundary onReset={() => setAppKey(k => k + 1)}>
      <App key={appKey} />
    </ErrorBoundary>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);

</script>
