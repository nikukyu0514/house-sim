<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>住宅購入リスクシミュレーター</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  /* ニュートラル（やや寒色寄りの白） */
  --bg: #f6f7f9;
  --bg-2: #eef1f4;
  --card: #ffffff;
  --ink: #1b1f24;
  --ink-2: #4a5159;
  --muted: #828b95;
  --line: #e6e9ee;
  --line-2: #d9dee4;

  /* セマンティック（同チャンネルで色相のみ変化） */
  --green:   oklch(0.62 0.13 150);
  --green-bg: oklch(0.97 0.03 150);
  --green-line: oklch(0.88 0.07 150);
  --amber:   oklch(0.70 0.13 75);
  --amber-bg: oklch(0.97 0.04 80);
  --amber-line: oklch(0.89 0.08 80);
  --red:     oklch(0.60 0.16 27);
  --red-bg:  oklch(0.97 0.03 27);
  --red-line: oklch(0.88 0.07 27);
  --blue:    oklch(0.58 0.15 250);
  --blue-bg: oklch(0.97 0.03 250);
  --blue-line: oklch(0.88 0.06 250);

  --r-sm: 8px;
  --r: 12px;
  --r-lg: 16px;
  --shadow: 0 1px 2px rgba(20,24,30,.04), 0 4px 16px rgba(20,24,30,.05);
  --shadow-lg: 0 2px 6px rgba(20,24,30,.06), 0 12px 36px rgba(20,24,30,.10);
  --ease: cubic-bezier(.22,.61,.36,1);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: "Noto Sans JP", system-ui, sans-serif;
  font-feature-settings: "palt";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.6;
}
.num { font-family: "Inter", "Noto Sans JP", sans-serif; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; white-space: nowrap; }
.unit { font-size: 0.58em; font-weight: 700; color: var(--muted); margin-left: 2px; }
button { font-family: inherit; cursor: pointer; }
input { font-family: inherit; }
::selection { background: oklch(0.88 0.06 250); }

/* スクロールバー控えめに */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 8px; border: 2px solid var(--bg); }

/* レイアウト */
.wrap { max-width: 1120px; margin: 0 auto; padding: 0 20px; }

.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r);
  box-shadow: var(--shadow);
}

/* フェードイン（translateのみ — アニメ停止時も内容は可視） */
@keyframes riseIn { from { transform: translateY(14px); } to { transform: none; } }
@media (prefers-reduced-motion: no-preference) {
  .rise { animation: riseIn .5s var(--ease) both; }
}
@keyframes fadeRise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

/* 順次更新時のパルス（光が走る演出） */
@keyframes pulseBg {
  0%   { background: rgba(59,130,246,0); box-shadow: 0 0 0 0 rgba(59,130,246,0); }
  30%  { background: rgba(59,130,246,.05); }
  60%  { background: rgba(59,130,246,.13); box-shadow: 0 0 0 6px rgba(59,130,246,.06); }
  100% { background: rgba(59,130,246,0); box-shadow: 0 0 0 0 rgba(59,130,246,0); }
}
.pulsing { animation: pulseBg .72s var(--ease) both; border-radius: 16px; }

@keyframes toastIn { from { opacity: 0; transform: translate(-50%, -16px); } to { opacity: 1; transform: translate(-50%, 0); } }

/* 2カラム→モバイルで1カラム */
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

@media (max-width: 640px) {
  .field-grid { grid-template-columns: 1fr; gap: 14px; }
  .hero-h1 { font-size: 25px !important; }
  .sec-title { font-size: 21px !important; }
}

/* ツールチップ（?アイコン） */
.qmark {
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--bg-2); color: var(--ink-2);
  font-size: 11px; font-weight: 700; line-height: 1; cursor: help;
  border: 1px solid var(--line-2); vertical-align: middle;
  user-select: none; flex: none;
}
.qmark:hover { background: var(--blue-bg); color: var(--blue); border-color: var(--blue-line); }

.pop {
  position: fixed; z-index: 320; max-width: 260px;
  background: var(--ink); color: #fff; font-size: 12.5px; line-height: 1.55;
  padding: 10px 12px; border-radius: var(--r-sm);
  box-shadow: var(--shadow-lg); font-weight: 400;
  animation: riseIn .16s var(--ease) both;
}
.pop::after {
  content: ""; position: absolute; bottom: -5px; left: var(--ax, 16px);
  width: 10px; height: 10px; background: var(--ink); transform: rotate(45deg);
}
.pop[data-below]::after { bottom: auto; top: -5px; }

/* レンジスライダー共通 */
input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px; border-radius: 4px;
  background: var(--line-2); outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 20px; height: 20px; border-radius: 50%;
  background: #fff; border: 2px solid var(--blue);
  box-shadow: 0 1px 4px rgba(20,24,30,.2); transition: transform .1s var(--ease);
}
input[type=range]::-webkit-slider-thumb:active { transform: scale(1.18); }
input[type=range]::-moz-range-thumb {
  width: 20px; height: 20px; border-radius: 50%;
  background: #fff; border: 2px solid var(--blue);
  box-shadow: 0 1px 4px rgba(20,24,30,.2);
}

#root { min-height: 100vh; }

/* スピナー */
.spin { width: 28px; height: 28px; border: 3px solid var(--line-2); border-top-color: var(--blue); border-radius: 50%; animation: rot .8s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }
</style>

<!-- ====================================================================
     初心者モード Notion風スキン（.notion-skin の中だけに効く・試作）
     ・色 = 意味のときだけ。彩度の高い色は青（操作）に限定。
     ・意味色（緑/橙/赤）は淡いトーンで、ドット・テキストに。
     ・面の色べた塗りをやめ、白＋0.5pxヘアラインで静かに。
     詳しく見るモードはこのスコープの外なので一切影響しない。
     ==================================================================== -->
<style id="notion-skin">
.notion-skin {
  /* 中立系（UI・構造のすべて） */
  --bg: #ffffff;
  --bg-2: #f7f7f5;
  --card: #ffffff;
  --ink: #37352f;
  --ink-2: #787774;
  --muted: #9b9a97;
  --line: #e9e9e7;
  --line-2: #d3d1cb;

  /* アクセント（操作のみ・青1色） */
  --blue: #2383e2;
  --blue-bg: #e7f3f8;
  --blue-line: #d4e7f3;

  /* 意味色（意味があるときだけ・淡く） */
  --green: #448361; --green-bg: #edf3ec; --green-line: #dde7d9;
  --amber: #d9730d; --amber-bg: #faebdd; --amber-line: #eedcc8;
  --red:   #d44c47; --red-bg:  #fbe4e4;  --red-line:  #f1cfce;

  --shadow: none;
  --shadow-lg: 0 1px 2px rgba(15,15,15,.05), 0 3px 8px rgba(15,15,15,.045);
  color: var(--ink);
}

/* カード全般：影を落としヘアラインで仕切る（縁取り色も中立へ） */
.notion-skin .card { box-shadow: none !important; border-color: var(--line) !important; }

/* 見出しは“叫ばない”ウェイトに */
.notion-skin .sec-title,
.notion-skin h2 { font-weight: 600 !important; }

/* --- 3ラインカード（BudgetCard）：中立化。違いはドットとタグだけ --- */
.notion-skin .bcard { border: 1px solid var(--line) !important; box-shadow: none !important; transform: none !important; }
.notion-skin .bcard-head { background: #fff !important; border-bottom: 1px solid var(--line) !important; }
.notion-skin .bcard-label { color: var(--ink) !important; font-weight: 500 !important; }
.notion-skin .bcard-dot { background: var(--muted) !important; }
.notion-skin .bcard[data-line="safe"]   .bcard-dot { background: var(--green) !important; }
.notion-skin .bcard[data-line="normal"] .bcard-dot { background: #337ea9 !important; }
.notion-skin .bcard[data-line="limit"]  .bcard-dot { background: var(--amber) !important; }
.notion-skin .bcard-badge { background: var(--blue-bg) !important; color: #337ea9 !important; }
.notion-skin .bcard-detailbtn { background: #F7F7F5 !important; border: 1px solid #E9E9E7 !important; color: var(--ink) !important; justify-content: flex-start !important; font-weight: 500 !important; gap: 10px !important; min-height: 44px; border-radius: 8px !important; }
.notion-skin .bcard-detailbtn::before { content: "\2261"; color: var(--muted); font-size: 15px; line-height: 1; }
.notion-skin .bcard-detailbtn > span:last-child { margin-left: auto; color: var(--muted) !important; }
.notion-skin .bcard-detailbtn:hover { background: #f1f1ef !important; }
.notion-skin .bcard-rule { border-color: var(--line) !important; }
.notion-skin .bcard-note { background: var(--bg-2) !important; color: var(--ink-2) !important; }
.notion-skin .bcard-diff { color: var(--ink-2) !important; font-weight: 500 !important; }

/* --- コールアウト統一：すべて淡いグレー面＋ヘアライン。区別はアイコンで --- */
/* 結論バナー：色べた塗り・色ヒゲをやめ、他コールアウトと同じトーンに */
.notion-skin .concl-banner { box-shadow: none !important; border: 1px solid var(--line) !important; background: var(--bg-2) !important; }
.notion-skin .concl-bar { display: none !important; }
.notion-skin .concl-kicker { color: var(--ink-2) !important; font-weight: 600 !important; }
.notion-skin .sec-kicker { display: none !important; }

/* コールアウト共通：強調は色ではなく太さ（w500）。リード語のみトーン色を1箇所まで */
.beg-callout strong { font-weight: 500; color: #37352F; }
.beg-callout .lead-red { color: var(--red); }
.beg-callout .lead-green { color: var(--green); }
.beg-callout .lead-blue { color: var(--blue); }
.notion-skin .inline-note { background: var(--bg-2) !important; border-color: var(--line) !important; color: var(--ink-2) !important; }
.notion-skin .rate-callout { background: var(--bg-2) !important; border-color: var(--line) !important; }
.notion-skin .drop-note { background: var(--bg-2) !important; border-color: var(--line) !important; }

/* --- 強調は色ではなく太字で：本文中の数字・キーワードは中立色に --- */
.notion-skin .em-soft { color: var(--ink) !important; }
.notion-skin .rate-delta { color: var(--ink) !important; }
.notion-skin .row-hl { background: var(--bg-2) !important; }

/* --- 出口：タイルを中立面に。プラスの手残りは本文色、赤は手出しだけ --- */
.notion-skin .exit-cell { background: #fff !important; border: 1px solid var(--line) !important; }
.notion-skin .exit-cell-label { color: var(--ink-2) !important; font-weight: 500 !important; }
.notion-skin .exit-net.pos { color: var(--ink) !important; }
</style>

<!-- ====================================================================
     新UI（lux-skin）── 上質なモダン金融ツール（Apple / Notion / Linear 寄り）
     ・落ち着いたブルーグレーを基調に、十分な余白・柔らかな影・美しい階層。
     ・内容（情報・数値ロジック）は初心者モードと完全に同一。見た目だけを刷新。
     ・初心者(.notion-skin)／詳細モードには一切影響しない。
     ==================================================================== -->
<style id="lux-skin">
.lux-root{
  --bg:#eef1f7; --bg-2:#e9edf4; --card:#ffffff;
  --ink:#1b2330; --ink-2:#586472; --muted:#98a2b1;
  --line:#e6eaf2; --line-2:#d6dde7;
  --blue:#4a6ea3; --blue-bg:#eef3fb; --blue-line:#d9e4f5;
  --green:#4c8568; --green-bg:#eef4f0; --green-line:#d6e5dd;
  --amber:#b27a36; --amber-bg:#f7efe1; --amber-line:#ecdcc5;
  --red:#bc564f; --red-bg:#f9eceb; --red-line:#efd3d1;
  --lux-shadow:0 1px 2px rgba(20,30,55,.04), 0 14px 38px -16px rgba(22,33,60,.18);
  --lux-shadow-sm:0 1px 2px rgba(20,30,55,.04), 0 6px 18px -10px rgba(22,33,60,.14);
  background:linear-gradient(180deg,#f3f5fa 0%, #e9edf5 420px, #e9edf5 100%);
  color:var(--ink);
  font-feature-settings:"palt";
  min-height:100vh;
}
/* 日本語の可読性：行間・字間を上品に */
.lux-skin, .lux-skin p, .lux-skin li, .lux-skin span:not(.unit){ letter-spacing:.006em; }
.lux-skin p, .lux-skin li{ line-height:1.9 !important; }
.lux-skin .num{ font-feature-settings:"tnum"; letter-spacing:-.015em; }

/* 上部バー＆トグルを上質に */
.lux-root > .wrap:first-child{ padding-top:26px !important; }
.lux-root .lux-sticky{ background:rgba(243,245,250,.78) !important; backdrop-filter:saturate(1.1) blur(14px); border-bottom:1px solid rgba(214,221,231,.7) !important; }

/* セクション間隔とカード：余白と柔らかな多層シャドウ */
.lux-skin{ padding-top:8px; }
.lux-skin section{ margin-top:72px !important; }
.lux-skin .card{ border:1px solid var(--line) !important; border-radius:20px !important; box-shadow:var(--lux-shadow) !important; }

/* 見出し：締まった字間、静かなウェイト */
.lux-skin h2{ letter-spacing:-.018em !important; font-weight:700 !important; }
.lux-skin .sec-title{ font-weight:700 !important; }
.lux-skin .sec-kicker{ display:none !important; }

/* Qバッジ：ソリッドな円より上品なリング＋スレート */
.lux-skin h2 + *, .lux-skin > div > div > span:first-child{ }

/* ---- 結論：ヒーロー化（白カード＋アクセント） ---- */
.lux-skin .beg-callout{ border-radius:16px !important; padding:18px 20px !important; gap:14px !important; box-shadow:var(--lux-shadow-sm); }
.lux-skin .beg-callout > div{ font-size:14.5px !important; line-height:1.85 !important; }
.lux-skin .beg-callout > span:first-child{ width:22px !important; height:22px !important; border-width:1.5px !important; font-size:12px !important; }
.lux-skin .beg-callout--conclusion{ background:#fff !important; border:1px solid var(--line) !important; padding:26px 28px !important; border-radius:20px !important; box-shadow:var(--lux-shadow) !important; position:relative; overflow:hidden; }
.lux-skin .beg-callout--conclusion::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:linear-gradient(180deg, var(--blue), #6f93c4); }
.lux-skin .beg-callout--conclusion > div{ font-size:19px !important; font-weight:600 !important; line-height:1.75 !important; color:#1b2330 !important; }
.lux-skin .beg-callout--conclusion > span:first-child{ background:var(--blue) !important; border-color:var(--blue) !important; color:#fff !important; width:26px !important; height:26px !important; }
.lux-skin .beg-callout--conclusion strong{ font-weight:700 !important; }

/* ---- 3ラインカード（BudgetCard） ---- */
.lux-skin .bcard{ border:1px solid var(--line) !important; border-radius:20px !important; box-shadow:var(--lux-shadow) !important; }
.lux-skin .bcard-head{ background:linear-gradient(180deg,#fbfcfe,#f4f7fb) !important; border-bottom:1px solid var(--line) !important; padding:20px 22px 18px !important; }
.lux-skin .bcard-label{ color:var(--ink) !important; font-weight:700 !important; letter-spacing:-.01em; }
.lux-skin .bcard-badge{ background:var(--blue) !important; color:#fff !important; letter-spacing:.02em; box-shadow:0 4px 12px -4px rgba(74,110,163,.5); }
.lux-skin .bcard-dot{ box-shadow:0 0 0 4px rgba(74,110,163,.10); }
.lux-skin .bcard[data-line="safe"]   .bcard-dot{ background:var(--green) !important; box-shadow:0 0 0 4px rgba(76,133,104,.12); }
.lux-skin .bcard[data-line="normal"] .bcard-dot{ background:var(--blue) !important; }
.lux-skin .bcard[data-line="limit"]  .bcard-dot{ background:var(--amber) !important; box-shadow:0 0 0 4px rgba(178,122,54,.12); }

/* ---- 帯型バナー：上質なトグル ---- */
.lux-skin .band-reveal-wrap > button{ background:#fbfcfe !important; border:1px solid var(--line) !important; border-radius:14px !important; min-height:52px !important; padding:0 18px !important; font-weight:600 !important; box-shadow:var(--lux-shadow-sm); transition:background .18s, box-shadow .18s; }
.lux-skin .band-reveal-wrap > button:hover{ background:#f4f7fb !important; }
.lux-skin .bcard-detailbtn{ border-radius:14px !important; min-height:52px !important; }

/* ---- 出口：5枚＋手残りカードを美しく ---- */
.lux-skin .exit-cell{ border-radius:18px !important; padding:20px 20px 22px !important; border:1px solid var(--line) !important; box-shadow:var(--lux-shadow-sm) !important; background-image:linear-gradient(180deg, rgba(255,255,255,.7), rgba(255,255,255,0)) !important; }
.lux-skin .exit-cell-label{ font-size:11.5px !important; font-weight:700 !important; letter-spacing:.01em; margin-bottom:14px !important; }
.lux-skin .exit-net{ font-size:34px !important; font-weight:800 !important; letter-spacing:-.03em !important; }
.lux-skin .exit-net.pos{ color:#1b2330 !important; }

/* ---- 主アクション（青ボタン） ---- */
.lux-skin .beg-primary{ border-radius:12px !important; padding:14px 26px !important; box-shadow:0 6px 18px -6px rgba(74,110,163,.55) !important; letter-spacing:.01em; transition:transform .12s, box-shadow .18s; }
.lux-skin .beg-primary:hover{ transform:translateY(-1px); box-shadow:0 10px 24px -8px rgba(74,110,163,.6) !important; }

/* QPromptRow の器を上質に */
.lux-skin .qprompt{ background:#fbfcfe !important; border:1px solid var(--line); border-radius:18px !important; padding:22px 24px !important; box-shadow:var(--lux-shadow-sm); }

/* ---- テーブル：余白と罫線を控えめに ---- */
.lux-skin table{ font-feature-settings:"tnum"; }
.lux-skin table thead th{ letter-spacing:.04em; }
.lux-skin .row-hl{ background:var(--blue-bg) !important; }

/* スライダーのつまみ・トラック */
.lux-root input[type=range]::-webkit-slider-thumb{ border-color:var(--blue); box-shadow:0 2px 8px rgba(74,110,163,.35); }

/* 意味ドットの余韻 */
.lux-skin .num.em-soft, .lux-skin .em-soft{ color:var(--ink) !important; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>


<script>
/* =========================================================================
   住宅購入リスクシミュレーター — 計算エンジン (純粋JS / window.Calc)
   全金額は「万円」単位で扱う。元利均等返済を基本とする。
   ※ 2026-06-18 計算ロジック一括改訂：取得税/減価率/育休/子ども費/保証料/
     手取り率/生活費率/固都税/完済年齢/暴落式/推奨頭金/保険・印紙 を精緻化。
     画面・入力・モード・段階開示は不変。係数はすべてコード内定数。
   ========================================================================= */
(function () {
  "use strict";

  // ---- 定数 ---------------------------------------------------------------
  const BASE_RATE = 1.0;          // ベース金利 (%) — 2026/6 メガバンク適用金利中央値
  const MGMT_BASE = 1.4;          // マンション管理費（首都圏基準・固定・万円/月）
  const MAX_AGE = 79;             // 完済上限年齢（9: 80→79）
  const TAKEHOME_RATE = 0.78;     // 年収→手取り換算（レガシー既定値。実計算は takeHomeRate() を使用）
  const RATIOS = { safe: 20, normal: 25, limit: 35 }; // 返済比率(%)

  // 6. 額面年収(万円/年)→手取り率（年収帯別テーブル）
  function takeHomeRate(annualIncomeMan) {
    const y = annualIncomeMan || 0;
    if (y <= 400) return 0.80;
    if (y <= 600) return 0.79;
    if (y <= 900) return 0.76;
    if (y <= 1200) return 0.72;
    return 0.68;
  }
  // 6補助：額面年収→月手取り(万円)
  function monthlyTakeHomeFromAnnual(annualIncomeMan) {
    return (annualIncomeMan || 0) * takeHomeRate(annualIncomeMan) / 12;
  }

  // 7. 生活費率（月手取り水準連動）。子ども費は含めない（項目4で別建て）。
  function livingRate(monthlyTakeHomeMan) {
    const m = monthlyTakeHomeMan || 0;
    if (m <= 20) return 0.70;
    if (m <= 35) return 0.65;
    return 0.58;
  }

  // 修繕積立金（築年数連動・万円/月）
  function repairReserve(bandKey) {
    const map = { a: 1.0, b: 1.3, c: 1.6, d: 2.0 };
    return bandKey && map[bandKey] != null ? map[bandKey] : 1.0; // 新築〜築5年=1.0
  }
  // マンションの月々固定費（管理費+修繕積立）
  function mansionMonthly(typeKey, bandKey) {
    const t = PROPERTY_TYPES[typeKey];
    if (!t || !t.isMansion) return { mgmt: 0, repair: 0, total: 0 };
    const repair = repairReserve(t.isUsed ? bandKey : null);
    return { mgmt: MGMT_BASE, repair, total: MGMT_BASE + repair };
  }

  // 返済比率ラベル
  const LINE_META = {
    safe:   { key: "safe",   label: "安全ライン", ratio: 20, tone: "green",
              note: "生活にゆとりを持ちながら無理なく返済できる水準です。" },
    normal: { key: "normal", label: "無難ライン", ratio: 25, tone: "amber",
              note: "毎月の住居費を手取りの25%以内に抑える、無理の出にくい目安のラインです。" },
    limit:  { key: "limit",  label: "限界ライン", ratio: 35, tone: "red",
              note: "銀行の審査（額面年収ベース）は通る水準ですが、手取りで見ると余裕は小さめです。産休・育休などで収入が下がる時期や、金利が上昇したときに家計が苦しくなる可能性があります。" },
  };

  // ---- 基本ローン計算 -----------------------------------------------------
  // 元利均等：毎月返済額 M = P r (1+r)^n / ((1+r)^n - 1)
  function monthlyPayment(principal, annualRatePct, years) {
    const n = years * 12;
    if (n <= 0) return 0;
    const r = annualRatePct / 100 / 12;   // 月利への単位変換はここで1回だけ
    if (r === 0) return principal / n;
    const f = Math.pow(1 + r, n);
    return principal * (r * f) / (f - 1);
  }

  // 月返済額から借入可能元本を逆算
  function borrowableFromMonthly(monthly, annualRatePct, years) {
    const n = years * 12;
    if (n <= 0) return 0;
    const r = annualRatePct / 100 / 12;
    if (r === 0) return monthly * n;
    const f = Math.pow(1 + r, n);
    return monthly * (f - 1) / (r * f);
  }

  // 借入可能な期間 (年)：min(50, 79−年齢)。20代は50年ローンも組めるため上限50年。
  function maxLoanYears(age) {
    return Math.max(10, Math.min(50, MAX_AGE - age));
  }

  // 残債：t年経過後のローン残高
  function remainingBalance(principal, annualRatePct, years, tYears) {
    const n = years * 12;
    const k = Math.min(n, Math.round(tYears * 12));
    const r = annualRatePct / 100 / 12;
    if (r === 0) return Math.max(0, principal * (1 - k / n));
    const f = Math.pow(1 + r, n);
    const fk = Math.pow(1 + r, k);
    const bal = principal * (f - fk) / (f - 1);
    return Math.max(0, bal);
  }

  // 年ごとの残債配列 (0..years)
  function balanceSeries(principal, annualRatePct, years) {
    const arr = [];
    for (let t = 0; t <= years; t++) {
      arr.push(remainingBalance(principal, annualRatePct, years, t));
    }
    return arr;
  }

  // ---- 購入形態メタ -------------------------------------------------------
  const PROPERTY_TYPES = {
    new_mansion:  { key: "new_mansion",  label: "新築マンション", isMansion: true,  isUsed: false, closingPct: 0.07 },
    used_mansion: { key: "used_mansion", label: "中古マンション", isMansion: true,  isUsed: true,  closingPct: 0.10 },
    new_house:    { key: "new_house",    label: "新築戸建て",     isMansion: false, isUsed: false, closingPct: 0.08 },
    used_house:   { key: "used_house",   label: "中古戸建て",     isMansion: false, isUsed: true,  closingPct: 0.12 },
  };

  const AGE_BANDS = {
    a: { key: "a", label: "築5年以内", reform: 30,  dep: -3.0 },
    b: { key: "b", label: "5〜15年",   reform: 100, dep: -2.0 },
    c: { key: "c", label: "15〜25年",  reform: 200, dep: -1.5 },
    d: { key: "d", label: "25年超",    reform: 350, dep: -6.3 },
  };

  // 2. 築年数帯に応じたベース減価率（年率 %）。
  //   マンション：新築直後が最も急→築15〜25年で緩やか→築25年超で再下落。
  //   戸建て：建物部分のみ年−4%・土地は横ばい、建物割合で加重した実効率。
  function depreciationPct(typeKey, bandKey) {
    const t = PROPERTY_TYPES[typeKey];
    if (t && t.isMansion) {
      if (!t.isUsed) return -3.0;            // 新築〜築5年
      const map = { a: -3.0, b: -2.0, c: -1.5, d: -6.3 };
      return map[bandKey] != null ? map[bandKey] : -2.0;
    }
    // 戸建て：建物−4%×建物割合（土地0%）
    const buildingShare = t && t.isUsed ? 0.4 : 0.6;
    return -4.0 * buildingShare;             // 新築戸建て=−2.4% / 中古戸建て=−1.6%
  }

  // ---- 諸費用内訳 ---------------------------------------------------------
  // 1. 不動産取得税：評価額（≒価格×0.65）基準＋住宅軽減。全種別対象（新築は実質ほぼ0）。
  function acquisitionTax(price, typeKey, bandKey) {
    const t = PROPERTY_TYPES[typeKey];
    const base = price * 0.65;               // 固定資産税評価額の概算
    if (!t.isUsed) {
      // 新築：建物1,200万控除で実質0が大半。高額帯のみ僅少。
      return price > 8000 ? 5 : price > 5000 ? 2 : 0;
    }
    // 中古：評価額から築年帯別の簡易控除を引いた分のみ課税（×3%）
    const ded = { a: 1200, b: 1000, c: 600, d: 300 }[bandKey] != null ? { a: 1200, b: 1000, c: 600, d: 300 }[bandKey] : 1000;
    return Math.max(0, (base - ded) * 0.03);
  }

  // 5. ローン保証料率（返済年数連動・借入額に対する一括前払い相当）
  function guaranteeRatePct(years) {
    if (years >= 35) return 2.0;
    if (years >= 30) return 1.8;
    if (years >= 25) return 1.5;
    if (years >= 20) return 1.3;
    return 1.0; // 15年以下
  }

  // price, loan は万円。配列で項目を返す。years は保証料の期間連動に使用。
  function closingCosts(price, loan, typeKey, bandKey, years) {
    const t = PROPERTY_TYPES[typeKey];
    const yrs = years || 35;
    const items = [];
    items.push({ name: "登記費用", amount: price * 0.008, timing: "決済時",
      help: "所有権を法的に登録するための費用（登録免許税＋司法書士報酬）。" });
    items.push({ name: "ローン保証料", amount: loan * guaranteeRatePct(yrs) / 100, timing: "決済時",
      help: "返済できなくなった場合に備えた保証会社への手数料。返済期間が長いほど高くなります（35年=2.0%／30年=1.8%／25年=1.5%／20年=1.3%／15年以下=1.0%）。金融機関により保証料無料（金利+0.2%程度）のプランもあり、その場合この費用は0です。" });
    items.push({ name: "火災保険（5年）", amount: t.isMansion ? 8 : 18, timing: "契約時",
      help: "ローン契約に必須の保険。マンションは専有部のみで安く、戸建ては建物全体を対象とするため高めです（5年・概算：マンション8万／戸建て18万）。" });
    items.push({ name: "固定資産税精算", amount: price * 0.003, timing: "決済時",
      help: "年度途中の購入時に、売主へ日割りで負担する税金です（購入後は毎年の固定資産税・都市計画税が別途かかります）。" });
    items.push({ name: "印紙税", amount: price > 5000 ? 3 : price > 1000 ? 1 : 0.5, timing: "契約時",
      help: "売買契約書に貼る収入印紙の代金。軽減後の目安は500万超〜1,000万で5千円、1,000万超〜5,000万で1万円、5,000万超〜1億で3万円です。" });

    if (t.isUsed) {
      items.push({ name: "仲介手数料", amount: price * 0.03 + 6 + (price * 0.03 + 6) * 0.1, timing: "契約・決済時",
        help: "物件を仲介した不動産会社へ支払う手数料。法律で上限が定められており、物件価格400万円超なら「価格×3%＋6万円＋消費税」が上限です（値引きや個別事情の例外もあります）。" });
      const band = AGE_BANDS[bandKey] || AGE_BANDS.b;
      items.push({ name: "リフォーム費（概算）", amount: band.reform, timing: "入居前",
        help: "築年数に応じた内装・設備の更新費用の目安です。" });
    }
    if (t.key === "new_mansion") {
      items.push({ name: "修繕積立基金", amount: 30, timing: "入居時",
        help: "入居時に一括で払う、将来の大規模修繕のための積立金です。" });
    }
    // 不動産取得税（全種別。新築は住宅軽減で実質0が大半）
    items.push({ name: "不動産取得税", amount: acquisitionTax(price, typeKey, bandKey), timing: "購入後半年ごろ",
      help: "評価額（時価の約7割、新築建物は5〜6割）を基準に住宅軽減を適用した概算です。新築や評価額の低い物件は0円になることが多いです。" });

    const total = items.reduce((s, i) => s + i.amount, 0);
    return { items, total };
  }

  // 8. 固定資産税・都市計画税のランニングコスト（月割・万円）。新築は当初5年は軽減。
  function propertyTaxMonthly(price, isNew, tYears) {
    let base = price * 0.65 * 0.017 / 12;    // 評価額×(固定1.4%＋都計0.3%)
    if (isNew && tYears < 5) base *= 0.75;    // 新築当初の建物分軽減（概算）
    return base;
  }

  // ---- アウトプット1：予算3ライン -----------------------------------------
  // inputs: { takeHome, savings, existingLoan, age, typeKey, bandKey }
  // opts:   { downPayment, years, rate }
  function budgetLine(meta, inp, opts) {
    const t = PROPERTY_TYPES[inp.typeKey];
    const years = opts.years;
    const rate = opts.rate;
    const ratio = meta.ratio / 100;
    // 返済可能月額（既存ローンを差し引く）
    let capacity = (inp.takeHome - inp.existingLoan) * ratio;
    // マンションは管理費・修繕積立金を差し引いてからローン返済可能額に
    const fee = mansionMonthly(inp.typeKey, inp.bandKey);
    const mgmt = fee.total;
    const loanMonthly = Math.max(0, capacity - mgmt);
    const loan = borrowableFromMonthly(loanMonthly, rate, years);
    const price = loan + (opts.downPayment || 0);
    const closing = closingCosts(price, loan, inp.typeKey, inp.bandKey, years);
    const totalPay = loanMonthly * years * 12 + (opts.downPayment || 0);
    return {
      ...meta,
      price, loan, downPayment: opts.downPayment || 0,
      loanMonthly, mgmt, mgmtBase: t.isMansion ? MGMT_BASE : 0, repair: t.isMansion ? repairReserve(t.isUsed ? inp.bandKey : null) : 0,
      monthlyTotal: loanMonthly + mgmt,
      closing: closing.total, closingItems: closing.items,
      totalPay, years, rate,
      initialCash: closing.total + (opts.downPayment || 0),
    };
  }

  function budget(inp, opts) {
    return {
      safe:   budgetLine(LINE_META.safe, inp, opts),
      normal: budgetLine(LINE_META.normal, inp, opts),
      limit:  budgetLine(LINE_META.limit, inp, opts),
    };
  }

  // ---- アウトプット2：金利シナリオ ----------------------------------------
  const RATE_SCENARIOS = [
    { key: "vlow",  icon: "📉", label: "超楽観", rate: 0.3, basis: "2024年の最低水準" },
    { key: "low",   icon: "📉", label: "楽観",   rate: 0.8, basis: "2025年以降のネット銀行実態" },
    { key: "base",  icon: "📊", label: "ベース", rate: 1.0, basis: "2026年6月・メガバンク適用金利中央値" },
    { key: "high",  icon: "📈", label: "悲観",   rate: 2.5, basis: "過去の日本の金利上昇局面" },
    { key: "vhigh", icon: "📈", label: "超悲観", rate: 4.0, basis: "主要銀行による10年後の金利予測の上限" },
  ];

  // loan(万円), years を基準に各シナリオの月額/総額/利息
  // 「ベース」はスライダーの現在金利(baseRate)を動的に使う
  function rateScenarios(loan, years, baseRate) {
    const fixed = RATE_SCENARIOS.filter(s => s.key !== "base");
    const baseScn = { key: "base", icon: "📊", label: "ベース", rate: baseRate, basis: "あなたの設定値" };
    const all = [...fixed, baseScn].sort((a, b) => a.rate - b.rate);
    return all.map(s => {
      const m = monthlyPayment(loan, s.rate, years);
      const total = m * years * 12;
      const interest = total - loan;
      return { ...s, monthly: m, total, interest, isBase: s.key === "base" };
    });
  }

  // ---- アウトプット3：出口戦略 --------------------------------------------
  // 物件価値の推移を5シナリオで。price=物件価格(万円)
  // strong 強気+1%/・mild やや強気0%/・base 標準(テーブル)/・weak やや弱気(base-1pt)/・crash 暴落
  // 互換：opt=strong, pess=crash
  const CRASH_SHOCK = 0.88;        // 10. 1年目末の一度きりショック −12%
  function valueSeries(price, maxYears, baseAnnualPct) {
    const basePct = (baseAnnualPct == null ? -1 : baseAnnualPct);
    const baseFactor = 1 + basePct / 100;
    const weakFactor = 1 + (basePct - 1) / 100;
    const strong = [], mild = [], base = [], weak = [], crash = [];
    for (let t = 0; t <= maxYears; t++) {
      strong.push(price * Math.pow(1.01, t));
      mild.push(price * Math.pow(1.0, t));
      base.push(price * Math.pow(baseFactor, t));
      weak.push(price * Math.pow(weakFactor, t));
      // 10. 合成順序：標準カーブ(baseFactor^t) → 1年目末に−12%ショックを一度だけ → 以降は標準で複利逓減
      const shock = t >= 1 ? CRASH_SHOCK : 1;
      crash.push(price * Math.pow(baseFactor, t) * shock);
    }
    return { strong, mild, base, weak, crash, opt: strong, pess: crash };
  }

  // 売却時サマリー（手数料：売却価格×3%+6万 *1.1 概算 + 印紙等少額）
  function sellFee(salePrice) {
    return salePrice * 0.03 * 1.1 + 6 * 1.1;
  }

  function exitSummary(price, loan, rate, years, sellYear, basePct) {
    const v = valueSeries(price, sellYear, basePct);
    const bal = remainingBalance(loan, rate, years, sellYear);
    const make = (sale) => {
      const fee = sellFee(sale);
      const net = sale - bal - fee;
      return { sale, fee, net };
    };
    return {
      balance: bal,
      strong: make(v.strong[sellYear]),
      mild:   make(v.mild[sellYear]),
      base:   make(v.base[sellYear]),
      weak:   make(v.weak[sellYear]),
      crash:  make(v.crash[sellYear]),
      opt:    make(v.strong[sellYear]),
      pess:   make(v.crash[sellYear]),
    };
  }

  // ---- ②途中入力 / ④ライフイベント ---------------------------------------
  // events: [{type, year, duration?, ...}], 各年の手取り・支出への影響を返す
  const EVENT_DEFS = {
    child:        { type: "child",        icon: "👶", label: "子ども誕生",        kind: "expense", monthly: 4, varying: "child" },
    leave_self:   { type: "leave_self",   icon: "🍼", label: "育休（本人）",      kind: "income_self" },
    leave_partner:{ type: "leave_partner",icon: "🍼", label: "育休（パートナー）",kind: "income_partner" },
    edu:          { type: "edu",          icon: "🎓", label: "教育費（私立）",    kind: "expense", monthly: 3, hasDuration: true },
    marriage:     { type: "marriage",     icon: "💍", label: "結婚",              kind: "lump", lump: 200, monthly: 0, editableLump: true },
    job_self:     { type: "job_self",     icon: "💼", label: "転職（本人）",      kind: "income_set_self" },
    job_partner:  { type: "job_partner",  icon: "💼", label: "転職（パートナー）",kind: "income_set_partner" },
    car:          { type: "car",          icon: "🚗", label: "車購入",            kind: "lump", lump: 300, monthly: 3 },
  };

  // 4. 子の年齢別 基礎養育費（万円/月）。教育費(edu)とは別建てで重複させない。
  function childBasicCost(ageYears) {
    if (ageYears < 0) return 0;
    if (ageYears <= 2) return 4;
    if (ageYears <= 5) return 5;
    if (ageYears <= 15) return 3;
    if (ageYears <= 18) return 4;
    return 0; // 19歳以降は独立想定
  }

  // 3. 育休の収入係数（年単位の月割按分）。最初の6か月=0.80、7か月目以降=0.67。
  //    yearIdx = その育休イベント開始からの経過年(0始まり)。
  function leaveIncomeFactor(yearIdx) {
    const startM = yearIdx * 12, endM = startM + 12;
    const m080 = Math.max(0, Math.min(endM, 6) - Math.min(startM, 6)); // [0,6)月
    const m067 = 12 - m080;
    return (m080 * 0.80 + m067 * 0.67) / 12;
  }

  // 年tにおける self/partner手取り・追加支出を返す（ratioTimeline / cashflow 共通ロジック）
  function eventStateAt(t, selfBase, partnerBase, sorted) {
    let self = selfBase, partner = partnerBase, expense = 0;
    (sorted || []).forEach(ev => {
      const def = EVENT_DEFS[ev.type];
      if (!def) return;
      if (def.kind === "expense") {
        if (def.varying === "child") {
          if (t >= ev.year) expense += childBasicCost(t - ev.year); // 子の年齢で変動
        } else {
          const active = def.hasDuration && ev.duration
            ? (t >= ev.year && t < ev.year + ev.duration) : (t >= ev.year);
          if (active) expense += def.monthly;
        }
      } else if (def.kind === "income_self") {
        const end = ev.year + (ev.duration || 1);
        if (t >= ev.year && t < end) self *= leaveIncomeFactor(t - ev.year);
      } else if (def.kind === "income_partner") {
        const end = ev.year + (ev.duration || 1);
        if (t >= ev.year && t < end) partner *= leaveIncomeFactor(t - ev.year);
      } else if (def.kind === "income_set_self") {
        if (t >= ev.year) self = monthlyTakeHomeFromAnnual(ev.newIncome || 0);
      } else if (def.kind === "income_set_partner") {
        if (t >= ev.year) partner = monthlyTakeHomeFromAnnual(ev.newIncome || 0);
      } else if (def.kind === "lump") {
        if (t >= ev.year) expense += def.monthly;
      }
    });
    return { self, partner, expense };
  }

  // 年ごとの返済比率（ライフイベント反映）
  function ratioTimeline(opts) {
    const { selfTakeHome, partnerTakeHome, existingLoan, monthlyHousing, years, events } = opts;
    const sorted = [...(events || [])].sort((a, b) => a.year - b.year);
    const series = [];
    for (let t = 0; t <= years; t++) {
      const st = eventStateAt(t, selfTakeHome, partnerTakeHome, sorted);
      const income = st.self + st.partner - existingLoan;
      const ratio = income > 0 ? (monthlyHousing + st.expense) / income * 100 : 999;
      series.push({ year: t, ratio, income, extraExpense: st.expense });
    }
    return series;
  }

  // ---- ライフイベント → 予算再計算 ----------------------------------------
  const LIVING_RATE = 0.65; // レガシー既定値（実計算は livingRate() を使用）

  // 実効手取り（self+partner−イベント支出）の各年系列
  function effectiveMonthlySeries(selfBase, partnerBase, years, events) {
    const sorted = [...(events || [])].sort((a, b) => a.year - b.year);
    const arr = [];
    for (let t = 0; t <= years; t++) {
      const st = eventStateAt(t, selfBase, partnerBase, sorted);
      arr.push(st.self + st.partner - st.expense);
    }
    return arr;
  }

  // ボトルネック手取り（全期間で最も厳しい年の実効手取り）
  function bottleneckTakeHome(selfBase, partnerBase, years, events) {
    const s = effectiveMonthlySeries(selfBase, partnerBase, years, events);
    return s.length ? Math.min(...s) : selfBase + partnerBase;
  }

  // 月々の家計収支（赤字判定用）。
  // opts: { selfBase, partnerBase, existingLoan, years, events, housing, living?, price?, isNew? }
  //  - living 未指定時は購入時手取り基準で livingRate() から固定算出（子ども費は含めない）。
  //  - price/isNew 指定時は固都税(propertyTaxMonthly)を住居費に各年加算（8）。
  function cashflow(opts) {
    const { selfBase, partnerBase, existingLoan, years, events, housing, price, isNew } = opts;
    const sorted = [...(events || [])].sort((a, b) => a.year - b.year);
    // 7. 生活費は購入時手取り基準で固定（収入側のみ各年変動＝二重変動させない）
    const baseTH = selfBase + partnerBase;
    const living = opts.living != null ? opts.living : baseTH * livingRate(baseTH);
    const series = [];
    for (let t = 0; t <= years; t++) {
      const st = eventStateAt(t, selfBase, partnerBase, sorted);
      const income = st.self + st.partner - existingLoan;
      const propTax = price ? propertyTaxMonthly(price, !!isNew, t) : 0;
      const balance = income - housing - propTax - living - st.expense;
      series.push({ year: t, balance, income, expense: st.expense });
    }
    let worst = series[0];
    series.forEach(p => { if (p.balance < worst.balance) worst = p; });
    const neg = series.filter(p => p.balance < 0);
    const deficitRange = neg.length ? [neg[0].year, neg[neg.length - 1].year] : null;
    return { series, worst, deficitRange, living };
  }

  // ---- バリデーション・診断 / 貯蓄↔頭金 ------------------------------------
  const SAFE_FLOOR_PRICE = 500;  // 安全ラインがこれ未満なら「まだ買えない」通知
  function lifeReserve(takeHome) { return Math.max(0, takeHome) * 6; }
  // 11. 推奨頭金 ＝ 用意できる資金 − 生活防衛費(手取り×6か月) − 初期費用(諸費用概算)
  function suggestedDownPayment(funds, takeHome, closing) {
    return Math.max(0, Math.round((funds - lifeReserve(takeHome) - (closing || 0)) / 10) * 10);
  }
  function completionAge(age, years) { return age + years; }

  // 入力検証（前向きトーン）。極端値・異常値・非数値をクラッシュ前に拾う。
  //  ※ ここは検証層のみ。予算などの算出ロジック・係数は一切変更していない。
  function inputValidity(inp) {
    if (!inp) return { ok: false, fields: {} };
    const fields = {};
    const num = (x) => typeof x === "number" && Number.isFinite(x);
    // 手取り（必須・正の値）
    if (!num(inp.takeHome) || inp.takeHome <= 0)
      fields.takeHome = "毎月の手取り額（万円）を入力してください。まずは本人の分だけでOKです。";
    else if (inp.takeHome > 300)
      fields.takeHome = "月手取りとしては大きい値のようです。月額（万円）でもう一度ご確認ください。";
    // 年齢（18〜75歳）
    if (!num(inp.age) || inp.age < 18 || inp.age > 75)
      fields.age = "18〜75歳の範囲で入力してください。";
    // 貯蓄（0以上・桁違いだけ案内）
    if (!num(inp.savings) || inp.savings < 0)
      fields.savings = "貯蓄額を入力してください（0でもOKです）。";
    else if (inp.savings > 100000)
      fields.savings = "貯蓄額の桁が大きいようです。万円単位でもう一度ご確認ください。";
    // 既存ローン（任意・0でOK。負数や桁違いだけ前向きに案内）
    if (num(inp.existingLoan)) {
      if (inp.existingLoan < 0)
        fields.existingLoan = "既存ローンの月額は0以上で入力してください。なければ0でOKです。";
      else if (inp.existingLoan > 300)
        fields.existingLoan = "既存ローン月額の桁が大きいようです。月額（万円）でご確認ください。";
    }
    return { ok: Object.keys(fields).length === 0, fields };
  }

  function diagnose(inp, budget) {
    const v = inputValidity(inp);
    if (!v.ok) return { code: "invalid", fields: v.fields };
    if (budget && budget.limit.loanMonthly < 1 && inp.existingLoan > 0) return { code: "excess_loan" };
    if (budget && budget.safe.price < SAFE_FLOOR_PRICE) return { code: "low_income" };
    return { code: "ok" };
  }

  // ---- ユーティリティ -----------------------------------------------------
  function fmtMan(v, digits = 1) {
    if (!isFinite(v)) return "—";
    return v.toLocaleString("ja-JP", { minimumFractionDigits: digits, maximumFractionDigits: digits });
  }
  function fmtOku(v) {
    return fmtMan(v, 0);
  }

  // ---- 検算（実装後の自己テスト） -----------------------------------------
  try {
    const m1 = monthlyPayment(3000, 1.0, 35) * 10000;   // 円

    console.assert(Math.abs(m2 - 107248) < 80, "[Calc] 3000万/2.5%/35年 月返済 ≈107,248円: 実=" + Math.round(m2));
  } catch (e) { /* console未対応環境は無視 */ }

  // ---- export -------------------------------------------------------------
  window.Calc = {
    BASE_RATE, MGMT_BASE, MAX_AGE, RATIOS, LINE_META,
    PROPERTY_TYPES, AGE_BANDS, RATE_SCENARIOS, EVENT_DEFS,
    monthlyPayment, borrowableFromMonthly, maxLoanYears,
    remainingBalance, balanceSeries, closingCosts, acquisitionTax, guaranteeRatePct,
    repairReserve, mansionMonthly, depreciationPct, propertyTaxMonthly,
    takeHomeRate, monthlyTakeHomeFromAnnual, livingRate,
    childBasicCost, leaveIncomeFactor,
    lifeReserve, suggestedDownPayment, completionAge, inputValidity, diagnose, SAFE_FLOOR_PRICE,
    budget, rateScenarios, valueSeries, sellFee, exitSummary,
    ratioTimeline, effectiveMonthlySeries, bottleneckTakeHome, cashflow,
    eventStateAt, LIVING_RATE, TAKEHOME_RATE, fmtMan, fmtOku,
  };
})();

// スライダー操作（トークン不変）では値に即座スナップしてカクツかない。
const AnimContext = React.createContext(0);
function useCountUp(target, token, dur = 800) {
  const [val, setVal] = useState(target);
  const prev = useRef(target);
  const lastTok = useRef(token);
  const raf = useRef(0);
  const done = useRef(0);
  useEffect(() => {
    if (token === lastTok.current) { prev.current = target; setVal(target); return; }
    lastTok.current = token;
    const from = prev.current, to = target, t0 = performance.now();
    cancelAnimationFrame(raf.current);
    clearTimeout(done.current);
    const tick = (now) => {
      const p = Math.min(1, (now - t0) / dur);

      setVal(from + (to - from) * e);
      if (p < 1) raf.current = requestAnimationFrame(tick);
      else prev.current = to;
    };

  }, [target, token]);

  broker: {
    label: "仲介手数料",
    def: "中古物件などで、仲介した不動産会社に支払う手数料。法律で上限が決まっています。",
    chips: ["仲介手数料って何？", "私の場合の上限はいくら？", "値引きや例外はある？"],
  },
  repair: {
    label: "修繕積立金",
    def: "マンションの将来の大規模修繕に備え、毎月積み立てるお金です。",
    chips: ["修繕積立金って何？", "なぜ築古ほど高い？", "私の月額はいくら？"],
  },
  down: {
    label: "頭金",
    def: "物件価格のうち、ローンを使わず最初に自己資金で払う部分です。",
    chips: ["頭金は多いほど良い？", "私はいくら入れるべき？", "生活防衛費って何？"],
  },
  amort: {
    label: "元利均等返済",
    def: "毎月の返済額が一定になる返済方式。多くの住宅ローンで使われます。",
    chips: ["元利均等返済って何？", "総額はどうなる？", "繰上返済は効く？"],
  },
  pair: {
    label: "ペアローン",
    def: "夫婦・パートナーが2本のローンを組み、収入を合算して借りる方法です。",
    chips: ["ペアローンって何？", "私たちは使うべき？", "注意点は？"],
  },
  term: {
    label: "ローン期間",
    def: "ローンを完済するまでの年数。長いほど月々は軽く、総返済額（利息）は増えます。",
    chips: ["何年にするのが良い？", "私の完済時年齢は？", "短くするとどう変わる？"],
  },
  baserate: {
    label: "基準金利",
    def: "金融機関が定める金利の基準値。実際の適用金利は、ここから優遇分を引いて決まります。",
    chips: ["基準金利って何？", "優遇金利との違いは？", "上がると私はどうなる？"],
  },
  giftexempt: {
    label: "住宅取得資金贈与の非課税特例",
    def: "親などから住宅資金の援助を受けても、一定額まで贈与税がかからない制度です。",
    chips: ["いくらまで非課税？", "私は使える？", "手続きや注意点は？"],
  },
};

// ユーザーの実数値から「事実」テキストを作る（AIには計算させず、これを言い換えさせる）
function factsText(ctx) {
  if (!ctx || !ctx.line) return "";
  const { inp, line, rate, years, sellYear, basePct } = ctx;
  const f = (v, d = 1) => Calc.fmtMan(v, d);
  const m25 = Calc.monthlyPayment(line.loan, 2.5, years);
  const dM = m25 - line.loanMonthly;
  const dTotal = dM * years * 12;
  const ex = Calc.exitSummary(line.price, line.loan, rate, years, sellYear, basePct);
  const reserve = Calc.lifeReserve(inp.takeHome);
  const parts = [
    `本人の手取り月${f(inp.takeHome,0)}万円`,
    `物件価格${f(line.price,0)}万円`,
    `借入${f(line.loan,0)}万円`,
    `金利${rate.toFixed(1)}%`,
    `借入期間${years}年`,
    `月々のローン返済${f(line.loanMonthly)}万円`,
    line.mgmt ? `管理費・修繕積立${f(line.mgmt)}万円` : null,
    `月々合計${f(line.monthlyTotal)}万円`,
    `頭金${f(line.downPayment,0)}万円`,
    `初期費用${f(line.closing,0)}万円`,
    `貯蓄${f(inp.savings,0)}万円`,
    `生活防衛費の目安（手取り6ヶ月）${f(reserve,0)}万円`,
    `金利が${rate.toFixed(1)}%→2.5%に上がると月々+${f(dM)}万円・${years}年総額で+${f(dTotal,0)}万円`,
    `${sellYear}年後に標準シナリオで売ると、想定売却${f(ex.base.sale,0)}万円・ローン残債${f(ex.balance,0)}万円・手残り${ex.base.net>=0?"+":"−"}${f(Math.abs(ex.base.net),0)}万円`,
  ].filter(Boolean);
  return parts.join("、") + "。";
}

function AiTerm({ termKey, ctx, children }) {
  const term = TERMS[termKey];
  const ctxFromProvider = useContextAI(AiCtxContext);
  const useCtx = ctx || ctxFromProvider;
  const [open, setOpen] = useStateAI(false);
  const [answers, setAnswers] = useStateAI({}); // chip -> {loading, text, error}
  const [free, setFree] = useStateAI("");
  const ref = useRefAI(null);
  const popRef = useRefAI(null);
  const [pos, setPos] = useStateAI({ left: 0, top: 0, below: false });

  useEffectAI(() => {
    if (!open) return;
    const place = () => {
      if (!ref.current) return;
      const r = ref.current.getBoundingClientRect();
      const W = Math.min(340, window.innerWidth - 24);
      let left = r.left + r.width / 2 - W / 2;
      left = Math.max(12, Math.min(left, window.innerWidth - W - 12));
      const below = r.top < 320; // 上に出すと画面外なら下に
      setPos({ left, top: below ? r.bottom + 8 : r.top - 8, below, w: W });
    };
    place();
    const onDoc = (e) => {
      if (ref.current && ref.current.contains(e.target)) return;
      if (popRef.current && popRef.current.contains(e.target)) return;
      setOpen(false);
    };
    document.addEventListener("mousedown", onDoc);
    window.addEventListener("resize", place);
    window.addEventListener("scroll", place, true);
    return () => {
      document.removeEventListener("mousedown", onDoc);
      window.removeEventListener("resize", place);
      window.removeEventListener("scroll", place, true);
    };
  }, [open]);

  const ask = async (question) => {
    const key = question;
    setAnswers(a => ({ ...a, [key]: { loading: true } }));
    try {
      const facts = factsText(useCtx);
      const prompt =
        `あなたは住宅購入の専門用語を、初めて家を買う20〜30代に説明するやさしいアドバイザーです。\n` +
        `次のユーザーの実数値だけを使って答えてください（あなた自身は計算しないこと。新しい金額を作らない）。\n` +
        `【ユーザーの数値】${facts}\n` +
        `【用語】${term.label}\n【質問】${question}\n\n` +
        `制約：必ず「あなたの場合は、」で始める。2〜3文・120字程度。専門用語はかみ砕く。` +
        `「借金」など不安をあおる語は避け、前向きで正直なトーンで。マークダウンや箇条書きは使わない。`;
      const text = await window.claude.complete({ messages: [{ role: "user", content: prompt }] });
      setAnswers(a => ({ ...a, [key]: { text: (text || "").trim() } }));
    } catch (e) {
      setAnswers(a => ({ ...a, [key]: { error: true } }));
    }
  };

  const popover = open && ReactDOM.createPortal(
    <div ref={popRef} onClick={(e) => e.stopPropagation()} style={{
      position: "fixed", left: pos.left, top: pos.top, width: pos.w || 320, zIndex: 300,
      transform: pos.below ? "none" : "translateY(-100%)",
      background: "#fff", border: "1px solid var(--line-2)", borderRadius: 14,
      boxShadow: "var(--shadow-lg)", padding: 16, animation: "riseIn .16s var(--ease) both",
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
        <span style={{ fontSize: 12, fontWeight: 800, color: "var(--blue)", background: "var(--blue-bg)", padding: "3px 9px", borderRadius: 999 }}>用語解説</span>
        <span style={{ fontSize: 14.5, fontWeight: 800 }}>{term.label}</span>
        <button onClick={() => setOpen(false)} style={{ marginLeft: "auto", border: "none", background: "var(--bg-2)", width: 26, height: 26, borderRadius: "50%", fontSize: 15, color: "var(--ink-2)" }}>×</button>
      </div>
      <p style={{ margin: "0 0 12px", fontSize: 13, lineHeight: 1.6, color: "var(--ink-2)" }}>{term.def}</p>
      <div style={{ fontSize: 11, fontWeight: 700, color: "var(--muted)", marginBottom: 7 }}>気になることをタップ（AIがあなたの数字で答えます）</div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
        {term.chips.map(c => (
          <button key={c} onClick={() => ask(c)}
            style={{ border: "1.5px solid var(--blue-line)", background: answers[c] ? "var(--blue-bg)" : "#fff", color: "var(--blue)", borderRadius: 999, padding: "6px 11px", fontSize: 12, fontWeight: 700, lineHeight: 1.3, textAlign: "left" }}>
            {c}
          </button>
        ))}
      </div>
      {/* 回答エリア */}
      {Object.entries(answers).map(([q, a]) => (
        <div key={q} style={{ marginTop: 12, background: "var(--bg)", borderRadius: 10, padding: "11px 13px" }}>
          <div style={{ fontSize: 11.5, fontWeight: 800, color: "var(--ink)", marginBottom: 5 }}>Q. {q}</div>
          {a.loading && (
            <div style={{ display: "flex", alignItems: "center", gap: 8, color: "var(--muted)", fontSize: 12.5 }}>
              <span className="spin" style={{ width: 15, height: 15, borderWidth: 2 }} />考えています…
            </div>
          )}
          {a.text && <div style={{ fontSize: 13, lineHeight: 1.65, color: "var(--ink-2)" }}>{a.text}</div>}
          {a.error && <div style={{ fontSize: 12.5, color: "var(--ink-2)", lineHeight: 1.6 }}>うまく解説を取得できませんでした。上の定義をご参照ください。もう一度お試しいただくこともできます。</div>}
        </div>
      ))}
      {/* 自由入力 */}
      <form onSubmit={(e) => { e.preventDefault(); if (free.trim()) { ask(free.trim()); setFree(""); } }}
        style={{ display: "flex", gap: 6, marginTop: 12 }}>
        <input value={free} onChange={(e) => setFree(e.target.value)} placeholder="自分の言葉で質問する…"
          style={{ flex: 1, border: "1.5px solid var(--line-2)", borderRadius: 9, padding: "8px 10px", fontSize: 12.5, outline: "none" }} />
        <button type="submit" style={{ border: "none", background: "var(--blue)", color: "#fff", borderRadius: 9, padding: "0 12px", fontSize: 13, fontWeight: 800 }}>→</button>
      </form>
    </div>,
    document.body
  );

  const labelText = typeof children === "string" ? children : term.label;
  return (
    <span ref={ref} onClick={(e) => { e.stopPropagation(); setOpen(o => !o); }}
      style={{
        cursor: "help", borderBottom: "1.5px dashed var(--blue)", color: "inherit",
        paddingBottom: 1, whiteSpace: labelText.length > 8 ? "normal" : "nowrap",
      }}>
      {children || term.label}
      {popover}
    </span>
  );
}

Object.assign(window, { AiTerm, TERMS, AiCtxContext });

</script>

<script type="text/babel">
/* SVGチャート群 — Rechartsを使わず自前描画（依存ゼロ） */
const { useState: _useStateC, useRef: _useRefC } = React;

/* 共通スケール */
function scaleLinear(d0, d1, r0, r1) {
  return (v) => r0 + (v - d0) / (d1 - d0) * (r1 - r0);
}
function niceMax(v) {
  const p = Math.pow(10, Math.floor(Math.log10(v)));
  const n = v / p;
  let m = n <= 1 ? 1 : n <= 2 ? 2 : n <= 2.5 ? 2.5 : n <= 5 ? 5 : 10;
  return m * p;
}

/* =====================================================================
   横棒グラフ：金利シナリオの月々返済額比較
   data: [{label, icon, monthly, isBase, rate}]  baseMonthly: 基準
   ===================================================================== */
function HBars({ data, baseMonthly }) {
  const beginner = React.useContext(BeginnerContext);
  const W = 720, rowH = 52, padL = 150, padR = 138, padT = 24;
  const H = padT * 2 + data.length * rowH;
  const maxV = niceMax(Math.max(...data.map(d => d.monthly)) * 1.05);
  const x = scaleLinear(0, maxV, padL, W - padR);
  const baseX = x(baseMonthly);
  const baseLabelX = Math.max(padL + 18, Math.min(baseX, W - padR - 18));
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      {/* 基準線 */}
      <line x1={baseX} x2={baseX} y1={padT} y2={H - padT} stroke="var(--ink-2)" strokeWidth="1.5" strokeDasharray="4 4" opacity=".5" />
      <text x={baseLabelX} y={14} fontSize="11" fill="var(--ink-2)" textAnchor="middle" fontWeight="700">ベース</text>
      {data.map((d, i) => {
        const y = padT + i * rowH + 8;
        const bw = x(d.monthly) - padL;
        const diff = d.monthly - baseMonthly;
        const tone = Math.abs(diff) < 0.05 ? "var(--blue)" : diff < 0 ? "var(--green)" : "var(--red)";
        return (
          <g key={d.key}>
            {beginner ? (
              <>
                <circle cx={14} cy={y + 16} r={5} fill={tone} />
                <text x={26} y={y + 20} fontSize="13.5" fill="var(--ink)" textAnchor="start" fontWeight={d.isBase ? 800 : 600}>{d.label}</text>
                <text x={26} y={y + 35} fontSize="10.5" fill="var(--muted)" textAnchor="start" className="num">{d.rate.toFixed(1)}%</text>
              </>
            ) : (
              <>
                <text x={padL - 12} y={y + 20} fontSize="13.5" fill="var(--ink)" textAnchor="end" fontWeight={d.isBase ? 800 : 600}>
                  {d.icon} {d.label}
                </text>
                <text x={padL - 12} y={y + 35} fontSize="10.5" fill="var(--muted)" textAnchor="end" className="num">{d.rate.toFixed(1)}%</text>
              </>
            )}
            <rect x={padL} y={y} width={Math.max(2, bw)} height={26} rx={6} fill={tone} opacity={d.isBase ? 1 : 0.82} />
            <text x={padL + Math.max(2, bw) + 8} y={y + 18} fontSize="13" fill="var(--ink)" fontWeight="800" className="num">
              {Calc.fmtMan(d.monthly)}<tspan fontSize="9" fill="var(--muted)">万</tspan>
              {!d.isBase && Math.abs(diff) >= 0.05 && (
                <tspan fontSize="11.5" fill={tone} fontWeight="700" dx="6">（{diff >= 0 ? "+" : "−"}{Calc.fmtMan(Math.abs(diff))}万）</tspan>
              )}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

/* =====================================================================
   出口戦略：物件価値 vs ローン残債 のエリアチャート
   series: { years:[], balance:[], opt:[], base:[], pess:[] }
   sellYear: 縦カーソル位置
   ===================================================================== */
function ExitChart({ series, sellYear, onChange }) {
  const W = 760, H = 380, padL = 56, padR = 18, padT = 26, padB = 34;
  const svgRef = _useRefC(null);
  const years = series.years;
  const maxY = niceMax(Math.max(...series.opt, ...series.balance, series.base[0]) * 1.05);
  const x = scaleLinear(0, years[years.length - 1], padL, W - padR);
  const y = scaleLinear(0, maxY, H - padB, padT);
  const path = (arr) => arr.map((v, i) => `${i === 0 ? "M" : "L"}${x(years[i]).toFixed(1)},${y(v).toFixed(1)}`).join(" ");

  // 差分エリア（ベース価値 vs 残債）をステップごとに符号で色分け
  const segs = [];
  for (let i = 0; i < years.length - 1; i++) {
    const x0 = x(years[i]), x1 = x(years[i + 1]);
    const vb0 = series.base[i], vb1 = series.base[i + 1];
    const rb0 = series.balance[i], rb1 = series.balance[i + 1];
    const positive = (vb0 + vb1) / 2 >= (rb0 + rb1) / 2;
    segs.push({
      d: `M${x0},${y(vb0)} L${x1},${y(vb1)} L${x1},${y(rb1)} L${x0},${y(rb0)} Z`,
      positive,
    });
  }
  const yTicks = 4;
  const cursorX = x(sellYear);
  const lastYear = years[years.length - 1];

  // ドラッグで売却タイミングを変更（PCクリック＋モバイルタッチ）
  const yearFromClientX = (clientX) => {
    const r = svgRef.current.getBoundingClientRect();
    const svgX = (clientX - r.left) / r.width * W;
    const yr = Math.round((svgX - padL) / ((W - padR) - padL) * lastYear);
    return Math.max(1, Math.min(lastYear, yr));
  };
  const onDown = (e) => {
    if (!onChange) return;
    e.preventDefault();
    const move = (cx) => onChange(yearFromClientX(cx));
    move(e.clientX);
    const pm = (ev) => move(ev.clientX);
    const up = () => { window.removeEventListener("pointermove", pm); window.removeEventListener("pointerup", up); };
    window.addEventListener("pointermove", pm);
    window.addEventListener("pointerup", up);
  };
  const pillW = 74;
  const pillX = Math.max(padL, Math.min(cursorX - pillW / 2, W - padR - pillW));

  return (
    <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block", touchAction: "none" }}>
      <defs>
        <clipPath id="plot"><rect x={padL} y={padT} width={W - padR - padL} height={H - padB - padT} /></clipPath>
      </defs>
      {/* グリッド + Y軸ラベル */}
      {Array.from({ length: yTicks + 1 }).map((_, i) => {
        const v = maxY / yTicks * i;
        const yy = y(v);
        return (
          <g key={i}>
            <line x1={padL} x2={W - padR} y1={yy} y2={yy} stroke="var(--line)" strokeWidth="1" />
            <text x={padL - 8} y={yy + 4} fontSize="10.5" fill="var(--muted)" textAnchor="end" className="num">{Calc.fmtMan(v, 0)}</text>
          </g>
        );
      })}
      {/* X軸ラベル */}
      {years.filter((_, i) => i % 5 === 0).map(yr => (
        <text key={yr} x={x(yr)} y={H - padB + 18} fontSize="10.5" fill="var(--muted)" textAnchor="middle" className="num">{yr}年</text>
      ))}

      <g clipPath="url(#plot)">
        {/* 差分エリア */}
        {segs.map((s, i) => (
          <path key={i} d={s.d} fill={s.positive ? "var(--green)" : "var(--red)"} opacity="0.13" />
        ))}
        {/* 物件価値 3本（強気 / 標準 / 暴落） */}
        <path d={path(series.opt)} fill="none" stroke="var(--green)" strokeWidth="2" strokeDasharray="5 4" opacity=".9" />
        <path d={path(series.base)} fill="none" stroke="var(--amber)" strokeWidth="2.5" />
        <path d={path(series.pess)} fill="none" stroke="var(--red)" strokeWidth="2" strokeDasharray="5 4" opacity=".9" />
        {/* ローン残債 */}
        <path d={path(series.balance)} fill="none" stroke="var(--blue)" strokeWidth="2.8" />
        {/* カーソル */}
        <line x1={cursorX} x2={cursorX} y1={padT} y2={H - padB} stroke="var(--ink)" strokeWidth="1.5" strokeDasharray="3 3" opacity=".55" />
        <circle cx={cursorX} cy={y(series.base[sellYear])} r="5" fill="var(--amber)" stroke="#fff" strokeWidth="2" />
        <circle cx={cursorX} cy={y(series.balance[sellYear])} r="5" fill="var(--blue)" stroke="#fff" strokeWidth="2" />
      </g>
      {/* 凡例（下部シナリオカードと同じ呼称・同じ色） */}
      <g transform={`translate(${padL + 6}, ${padT + 4})`} fontSize="11" fontWeight="600">
        <LegendDot x={0}   label="残債" color="var(--blue)" />
        <LegendDot x={62}  label="価値（強気）" color="var(--green)" dash />
        <LegendDot x={166} label="価値（標準）" color="var(--amber)" />
        <LegendDot x={262} label="価値（暴落）" color="var(--red)" dash />
      </g>

      {/* インタラクティブ層：縦線をドラッグして売却タイミングを変更 */}
      <rect x={padL} y={padT} width={W - padR - padL} height={H - padB - padT} fill="transparent" style={{ cursor: "pointer" }} onPointerDown={onDown} />
      <rect x={cursorX - 12} y={padT} width={24} height={H - padB - padT} fill="transparent" style={{ cursor: "ew-resize" }} onPointerDown={onDown} />
      <g style={{ cursor: "ew-resize" }} onPointerDown={onDown}>
        <rect x={pillX} y={padT - 20} width={pillW} height={19} rx={9.5} fill="var(--ink)" />
        <text x={pillX + pillW / 2} y={padT - 6.5} fontSize="11.5" fill="#fff" textAnchor="middle" fontWeight="800">↔ {sellYear}年後</text>
      </g>
    </svg>
  );
}
function LegendDot({ x, label, color, dash }) {
  return (
    <g transform={`translate(${x},0)`}>
      <line x1="0" x2="16" y1="5" y2="5" stroke={color} strokeWidth="2.5" strokeDasharray={dash ? "4 3" : "none"} />
      <text x="20" y="9" fill="var(--ink-2)">{label}</text>
    </g>
  );
}

/* =====================================================================
   ④返済比率タイムライン
   base: [{year, ratio}] (イベントなし), withEv: [{year, ratio}],
   pess: [{year, ratio}] (悲観金利・イベント込み), events:[{year,icon,label}]
   ===================================================================== */
function RatioTimeline({ base, withEv, pess, events }) {
  const W = 760, H = 360, padL = 48, padR = 18, padT = 22, padB = 40;
  const maxYear = withEv[withEv.length - 1].year;
  const maxR = Math.max(40, Math.min(60, Math.ceil(Math.max(...withEv.map(d => d.ratio), ...pess.map(d => d.ratio)) / 5) * 5));
  const x = scaleLinear(0, maxYear, padL, W - padR);
  const y = scaleLinear(0, maxR, H - padB, padT);
  const path = (arr) => arr.map((d, i) => `${i === 0 ? "M" : "L"}${x(d.year).toFixed(1)},${y(Math.min(d.ratio, maxR)).toFixed(1)}`).join(" ");

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      {/* 危険ゾーン 35%超 */}
      <rect x={padL} y={padT} width={W - padR - padL} height={y(35) - padT} fill="var(--red)" opacity="0.07" />
      {/* Yグリッド */}
      {[0, 10, 20, 30, 40, 50, 60].filter(v => v <= maxR).map(v => (
        <g key={v}>
          <line x1={padL} x2={W - padR} y1={y(v)} y2={y(v)} stroke="var(--line)" strokeWidth="1" />
          <text x={padL - 8} y={y(v) + 4} fontSize="10.5" fill="var(--muted)" textAnchor="end" className="num">{v}%</text>
        </g>
      ))}
      {/* 基準線 25% / 35% */}
      <line x1={padL} x2={W - padR} y1={y(25)} y2={y(25)} stroke="var(--green)" strokeWidth="1.5" strokeDasharray="5 4" />
      <text x={W - padR} y={y(25) - 5} fontSize="10.5" fill="var(--green)" textAnchor="end" fontWeight="700">安全 25%</text>
      <line x1={padL} x2={W - padR} y1={y(35)} y2={y(35)} stroke="var(--red)" strokeWidth="1.5" strokeDasharray="5 4" />
      <text x={W - padR} y={y(35) - 5} fontSize="10.5" fill="var(--red)" textAnchor="end" fontWeight="700">危険 35%</text>
      {/* Xラベル */}
      {Array.from({ length: Math.floor(maxYear / 5) + 1 }).map((_, i) => {
        const yr = i * 5;
        return <text key={yr} x={x(yr)} y={H - padB + 18} fontSize="10.5" fill="var(--muted)" textAnchor="middle" className="num">{yr}年</text>;
      })}
      {/* 悲観金利ライン（薄く） */}
      <path d={path(pess)} fill="none" stroke="var(--red)" strokeWidth="1.5" opacity=".4" strokeDasharray="2 3" />
      {/* イベントなし（点線） */}
      <path d={path(base)} fill="none" stroke="var(--ink-2)" strokeWidth="1.5" strokeDasharray="5 4" opacity=".5" />
      {/* イベント込み（実線・青） */}
      <path d={path(withEv)} fill="none" stroke="var(--blue)" strokeWidth="2.8" />
      {/* イベントマーカー */}
      {(events || []).map((ev, i) => {
        const px = x(ev.year);
        const d = withEv.find(p => p.year === ev.year) || withEv[withEv.length - 1];
        const py = y(Math.min(d.ratio, maxR));
        return (
          <g key={i}>
            <line x1={px} x2={px} y1={py} y2={H - padB} stroke="var(--ink-2)" strokeWidth="1" strokeDasharray="2 3" opacity=".3" />
            <circle cx={px} cy={py} r="13" fill="#fff" stroke="var(--blue)" strokeWidth="1.5" />
            <text x={px} y={py + 5} fontSize="13" textAnchor="middle">{ev.icon}</text>
          </g>
        );
      })}
      {/* 凡例 */}
      <g transform={`translate(${padL + 4}, ${padT - 8})`} fontSize="11" fontWeight="600">
        <LegendDot x={0} label="イベント込み" color="var(--blue)" />
        <LegendDot x={108} label="イベントなし" color="var(--ink-2)" dash />
        <LegendDot x={216} label="悲観金利" color="var(--red)" dash />
      </g>
    </svg>
  );
}

<script type="text/babel">
/* アウトプット2：金利変動シミュレーション */
function OutputRate({ loan, years, baseRate }) {
  const beginner = React.useContext(BeginnerContext);
  const scenarios = Calc.rateScenarios(loan, years, baseRate);
  const base = scenarios.find(s => s.isBase) || scenarios[2];
  const higher = scenarios.filter(s => s.rate > base.rate + 0.001).sort((a, b) => a.rate - b.rate);
  const hi = higher[0];
  const diffMonthly = hi ? hi.monthly - base.monthly : 0;
  const diffTotal = hi ? hi.total - base.total : 0;
  const rateTone = (s) => Math.abs(s.rate - base.rate) < 0.001 ? "blue" : s.rate < base.rate ? "green" : "red";

  return (
    <section style={{ marginTop: 56 }}>
      <SectionHead kicker="OUTPUT 2 ── 金利変動" title="もし金利が動いたら、返済はどう変わる？"
        sub={<>『無難ライン』の借入額をベースに、過去に実際あった水準で5パターン試算。<AiTerm termKey="kinri">金利</AiTerm>の不確実性を、具体的な金額で掴んでおきましょう。</>} />

      {/* ハイライト */}
      {hi && (
      beginner ? (
        <div style={{ marginBottom: 18 }}>
          <Callout tone="neutral">
            金利が <strong style={{ fontWeight: 500 }}>{base.rate.toFixed(1)}% → {hi.rate.toFixed(1)}%</strong> に上がると、月々は <strong style={{ fontWeight: 500 }}>＋<AnimNum value={diffMonthly} /></strong>、{years}年総額で <strong style={{ fontWeight: 500 }}>＋<AnimNum value={diffTotal} digits={0} /></strong> の差になります。
          </Callout>
        </div>
      ) : (
      <div className="card rate-callout" style={{ padding: "16px 20px", marginBottom: 18, display: "flex", flexWrap: "wrap", gap: 16, alignItems: "center", background: "var(--amber-bg)", border: "1px solid var(--amber-line)" }}>
        <span style={{ fontSize: 22 }}>📈</span>
        <div style={{ flex: 1, minWidth: 240, fontSize: 14.5, lineHeight: 1.6 }}>
          金利が <strong className="num rate-delta" style={{ color: "var(--amber)" }}>{base.rate.toFixed(1)}% → {hi.rate.toFixed(1)}%</strong> に上がると、
          月々は <strong className="rate-delta" style={{ color: "var(--red)" }}>＋<AnimNum value={diffMonthly} /></strong>、
          {years}年総額で <strong className="rate-delta" style={{ color: "var(--red)" }}>＋<AnimNum value={diffTotal} digits={0} /></strong> の差になります。
        </div>
      </div>
      )
      )}

      {/* 横棒グラフ */}
      <div className="card" style={{ padding: "20px 18px 14px" }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: "var(--ink-2)", marginBottom: 8, paddingLeft: 4 }}>月々返済額の比較</div>
        <HBars data={scenarios} baseMonthly={base.monthly} />
      </div>

      {/* テーブル */}
      <div className="card" style={{ marginTop: 18, padding: "6px 0", overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5, minWidth: 560 }}>
          <thead>
            <tr style={{ color: "var(--muted)", fontSize: 11.5, textAlign: "right" }}>
              <th style={{ padding: "12px 16px", fontWeight: 700, textAlign: "left" }}>シナリオ</th>
              <th style={{ padding: "12px 16px", fontWeight: 700 }}>金利</th>
              <th style={{ padding: "12px 16px", fontWeight: 700, textAlign: "left" }}>根拠</th>
              <th style={{ padding: "12px 16px", fontWeight: 700 }}>月々返済</th>
              <th style={{ padding: "12px 16px", fontWeight: 700 }}>総支払額</th>
              <th style={{ padding: "12px 16px", fontWeight: 700 }}>利息合計</th>
            </tr>
          </thead>
          <tbody>
            {scenarios.map(s => (
              <tr key={s.key} className={s.isBase ? "row-hl" : ""} style={{ borderTop: "1px solid var(--line)", background: s.isBase ? "var(--blue-bg)" : "transparent" }}>
                <td style={{ padding: "13px 16px", fontWeight: s.isBase ? 800 : 600 }}>
                  {beginner
                    ? <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}><MeaningDot tone={rateTone(s)} />{s.label}</span>
                    : <>{s.icon} {s.label}</>}
                </td>
                <td style={{ padding: "13px 16px", textAlign: "right", fontWeight: 800 }} className="num">{s.rate.toFixed(1)}%</td>
                <td style={{ padding: "13px 16px", color: "var(--ink-2)", fontSize: 12 }}>{s.basis}</td>
                <td style={{ padding: "13px 16px", textAlign: "right", fontWeight: 700 }}><AnimNum value={s.monthly} unit="万" /></td>
                <td style={{ padding: "13px 16px", textAlign: "right" }}><AnimNum value={s.total} digits={0} unit="万" /></td>
                <td style={{ padding: "13px 16px", textAlign: "right", color: "var(--ink-2)" }}><AnimNum value={s.interest} digits={0} unit="万" /></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <p style={{ marginTop: 12, fontSize: 12, color: "var(--muted)", lineHeight: 1.6 }}>
        ※ いずれも<AiTerm termKey="amort">元利均等返済</AiTerm>（毎月の返済額が一定になる方式）で試算しています。
      </p>
    </section>
  );
}

Object.assign(window, { OutputRate });

</script>

<script type="text/babel">
/* アウトプット3：出口戦略（売却シミュレーション）★キラー機能 */

const TYPE_TENDENCY = {

  used_house: "中古戸建ては建物の残存価値が少ない分、購入価格に占める土地比率が高くなります。土地値が底値に近ければ「これ以上は下がりにくい」一方で、建物の修繕・建替え費用を別途見込んでおく必要があります。",
};
function ExitSummaryCell({ s, tone, label, compact }) {
  const t = TONES[tone];
  const positive = s.net >= 0;
  return (
    <div className="exit-cell" style={{ background: t.bg, border: `1px solid ${t.line}`, borderRadius: 12, padding: compact ? "13px 13px 15px" : "16px 16px 18px", flex: 1, minWidth: compact ? 150 : 180 }}>
      <div className="exit-cell-label" style={{ fontSize: compact ? 11.5 : 12.5, fontWeight: 800, color: t.c, marginBottom: 10, lineHeight: 1.35 }}>{label}</div>
      <SmallRow label="推定売却価格" value={s.sale} />
      <SmallRow label="ローン残債" value={s.balance} minus />
      <SmallRow label="売却手数料" value={s.fee} minus />
      <div style={{ borderTop: `1px dashed ${t.line}`, marginTop: 8, paddingTop: 10 }}>
        <div style={{ fontSize: 11, color: "var(--ink-2)", fontWeight: 700, marginBottom: 2 }}>{positive ? "手元に残る" : "手出しが必要"}</div>
        <div className={"num exit-net " + (positive ? "pos" : "neg")} style={{ fontSize: compact ? 21 : 26, fontWeight: 900, color: positive ? "var(--green)" : "var(--red)" }}>
          {positive ? "+" : "−"}<AnimNum value={Math.abs(s.net)} digits={0} />
        </div>
      </div>
    </div>
  );
}
function SmallRow({ label, value, minus }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "3px 0" }}>
      <span style={{ fontSize: 12, color: "var(--ink-2)" }}>{label}</span>
      <span className="num" style={{ fontSize: 13.5, fontWeight: 700 }}>{minus ? "−" : ""}<AnimNum value={value} digits={0} unit="万" /></span>
    </div>
  );
}

/* 初心者モード用：「手元に残る」金額1つだけの最小セル。プラスは本文色・マイナスのときだけ赤 */
function ExitNetCell({ s, label }) {
  const positive = s.net >= 0;
  return (
    <div className="exit-cell" style={{ background: "#fff", border: "1px solid var(--line)", borderRadius: 12, padding: "16px 16px 18px", flex: 1, minWidth: 150 }}>
      <div className="exit-cell-label" style={{ fontSize: 12.5, fontWeight: 800, color: "var(--ink-2)", marginBottom: 10, lineHeight: 1.35 }}>{label}</div>

        {positive ? "+" : "−"}<AnimNum value={Math.abs(s.net)} digits={0} />
      </div>
    </div>
  );
}

function OutputExit({ price, loan, rate, years, sellYear, setSellYear, basePct, typeKey, beginner }) {
  const maxYears = 20;
  const v = Calc.valueSeries(price, maxYears, basePct);
  const bal = Calc.balanceSeries(loan, rate, years).slice(0, maxYears + 1);
  // years配列が足りない場合の補完
  while (bal.length < maxYears + 1) bal.push(Calc.remainingBalance(loan, rate, years, bal.length));
  const series = { years: Array.from({ length: maxYears + 1 }, (_, i) => i), balance: bal, opt: v.opt, base: v.base, pess: v.pess };

  const sum = Calc.exitSummary(price, loan, rate, years, sellYear, basePct);
  const baseNet = sum.base.net;

    <section style={{ marginTop: 56 }}>

          </InlineNote>
        </div>

      {/* 売却タイミングスライダー */}
      <div className="card" style={{ marginTop: 18, padding: "20px 22px" }}>

          <div style={{ flex: 1, minWidth: 260 }}>
            <SliderField label="売却タイミング" value={sellYear} min={1} max={20} step={1}
              onChange={setSellYear} format={(v) => `購入${v}年後`} />
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 12, color: "var(--muted)", fontWeight: 700 }}>ベースシナリオでの結果</div>
            <div className={"num " + (baseNet >= 0 ? "em-soft" : "")} style={{ fontSize: 22, fontWeight: 900, color: baseNet >= 0 ? "var(--green)" : "var(--red)" }}>
              {baseNet >= 0 ? `売却で+${Calc.fmtMan(baseNet, 0)}万円` : `${Calc.fmtMan(Math.abs(baseNet), 0)}万円の持ち出し`}
            </div>

        {/* サマリー：初心者は「中心・最悪」の2つ＋手残りのみ、詳細は段階開示 */}

          <>
            <div style={{ fontSize: 12, color: "var(--muted)", fontWeight: 700, marginTop: 22, marginBottom: 10 }}>

      <div style={{ marginTop: 16 }}>
        {beginner ? (

            <strong style={{ fontWeight: 500 }}>手出し（持ち出し）が必要とは？</strong>　売却価格がローンの残りを下回る状態のこと。差額を自己資金で補う必要があり、「売りたくても売れない」原因になります。上の暴落シナリオが、その典型です。

        </div>
